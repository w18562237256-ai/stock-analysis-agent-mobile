<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1118" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="股票Agent" />
  <title>股票分析 Agent 手机版</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1118;
      --panel: #121922;
      --panel-2: #151f2c;
      --panel-3: #0f1721;
      --line: #263242;
      --muted: #8ea0b5;
      --text: #eaf2ff;
      --green: #28d76f;
      --red: #ff4d63;
      --blue: #43a5ff;
      --yellow: #ffbd3e;
      --violet: #8b7bff;
      --shadow: 0 16px 44px rgba(0, 0, 0, .32);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 0%, rgba(67, 165, 255, .11), transparent 28%),
        linear-gradient(135deg, #081018 0%, #0d121a 48%, #101820 100%);
      color: var(--text);
      min-height: 100vh;
    }

    body.locked .app {
      display: none;
    }

    body.locked .mobile-dock {
      display: none;
    }

    .access-gate {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(67, 165, 255, .16), transparent 30%),
        #0b1118;
    }

    body.locked .access-gate {
      display: flex;
    }

    .gate-card {
      width: min(420px, 100%);
      border: 1px solid #263242;
      border-radius: 8px;
      background: #121922;
      box-shadow: 0 16px 44px rgba(0, 0, 0, .32);
      padding: 18px;
    }

    .gate-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .gate-card p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 14px;
      font-size: 13px;
    }

    .gate-error {
      min-height: 20px;
      color: var(--red);
      font-size: 13px;
      margin-top: 8px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app {
      width: min(1840px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(580px, 1.65fr);
      gap: 16px;
      align-items: stretch;
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .88);
      box-shadow: var(--shadow);
      border-radius: 8px;
      padding: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #14345a, #112236);
      color: #62b6ff;
      border: 1px solid #24435f;
      font-weight: 900;
      font-size: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2vw, 30px);
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) 140px 140px 160px;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    input, textarea, select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b121b;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #3f8fd4;
      box-shadow: 0 0 0 3px rgba(67, 165, 255, .14);
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #182536;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: #1f9c55;
      background: linear-gradient(180deg, #18a756, #0f7e42);
    }

    .btn.ghost {
      background: #0d141d;
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .76);
      color: var(--muted);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
    }

    .tab.active {
      background: #122334;
      border-color: #2b83c6;
      color: #d8ecff;
    }

    .live-console {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto 150px;
      gap: 12px;
      align-items: center;
      margin: 14px 0;
      padding: 10px 12px;
      border: 1px solid #294058;
      border-radius: 8px;
      background: #101a25;
    }

    .live-phase {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .live-icon {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #73c2ff;
      background: rgba(67, 165, 255, .13);
    }

    .live-phase strong,
    .live-phase span {
      display: block;
    }

    .live-phase strong {
      font-size: 15px;
    }

    .live-phase div > span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .live-freshness {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #83e7aa;
      font-size: 12px;
      white-space: nowrap;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(40, 215, 111, .12);
    }

    .live-freshness.loading { color: #8dccff; }
    .live-freshness.loading .live-dot { background: var(--blue); box-shadow: 0 0 0 4px rgba(67, 165, 255, .12); }
    .live-freshness.stale { color: #ffcf70; }
    .live-freshness.stale .live-dot { background: var(--yellow); box-shadow: 0 0 0 4px rgba(255, 189, 62, .12); }
    .live-freshness.error { color: #ff8e9b; }
    .live-freshness.error .live-dot { background: var(--red); box-shadow: 0 0 0 4px rgba(255, 77, 99, .12); }

    .live-refresh {
      border-color: #2b83c6;
      background: #12304a;
      color: #dcefff;
    }

    .live-refresh.refreshing svg {
      animation: spin .9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 78px;
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .82);
      border-radius: 8px;
      padding: 14px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 9px;
      font-size: clamp(20px, 2vw, 27px);
      line-height: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(560px, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .9);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .22);
    }

    .panel-head {
      padding: 14px;
      border-bottom: 1px solid #202b39;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .panel-body {
      padding: 14px;
    }

    .watchlist {
      display: grid;
      gap: 8px;
    }

    .watch-btn {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      text-align: left;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #202b39;
      background: #0f1721;
      color: var(--text);
      cursor: pointer;
    }

    .watch-remove {
      width: 28px;
      height: 28px;
      border: 1px solid #314054;
      border-radius: 6px;
      background: #141e2a;
      color: #ff8794;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      align-self: start;
    }

    .watch-btn.active {
      border-color: #2f90d6;
      background: #132235;
    }

    .code {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .price-up { color: var(--red); }
    .price-down { color: var(--green); }

    .agent-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(20, 28, 39, .96), rgba(13, 19, 28, .96));
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .stock-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid #202b39;
    }

    .stock-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .big-price {
      font-size: 34px;
      font-weight: 900;
      text-align: right;
      line-height: 1;
    }

    .change {
      margin-top: 8px;
      text-align: right;
      font-weight: 800;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 20px 4px;
    }

    .badge {
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 900;
      background: #16202d;
      color: #b7c9dd;
    }

    .badge.buy { color: #80ffb1; background: rgba(40, 215, 111, .12); }
    .badge.sell { color: #ff8794; background: rgba(255, 77, 99, .13); }
    .badge.wait { color: #ffd583; background: rgba(255, 189, 62, .13); }
    .badge.info { color: #80c6ff; background: rgba(67, 165, 255, .14); }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px 20px;
    }

    .kv {
      display: grid;
      gap: 9px;
    }

    .kv div {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .kv b {
      color: var(--text);
      font-size: 15px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 20px 16px;
    }

    .score-box {
      background: #0d1620;
      border: 1px solid #192635;
      border-radius: 6px;
      padding: 12px;
    }

    .score-box span {
      color: var(--muted);
      font-size: 12px;
    }

    .score-box strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
    }

    .daily-strategy-panel {
      margin-bottom: 14px;
      border: 1px solid #29445b;
      border-left: 3px solid var(--yellow);
      border-radius: 8px;
      background: #101a24;
      padding: 14px;
    }

    .daily-strategy-panel.safe { border-left-color: var(--red); }
    .daily-strategy-panel.danger { border-left-color: var(--green); }

    .daily-strategy-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .daily-strategy-head .section-title { margin-bottom: 3px; }
    .daily-strategy-head > div > span { color: var(--muted); font-size: 12px; }

    .daily-status {
      flex: 0 0 auto;
      border-radius: 5px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 900;
    }

    .daily-status.safe { color: #ff9ca8; background: rgba(255, 77, 99, .11); }
    .daily-status.warn { color: #ffd583; background: rgba(255, 189, 62, .11); }
    .daily-status.danger { color: #7feaab; background: rgba(40, 215, 111, .11); }

    .strategy-timeline {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
      margin-bottom: 9px;
    }

    .strategy-timeline span {
      min-height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid #273548;
      border-radius: 5px;
      background: #0d151e;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
    }

    .strategy-timeline span.active {
      border-color: #3785bd;
      background: #16324a;
      color: #dcefff;
      font-weight: 900;
    }

    .daily-action {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .daily-action > div,
    .accuracy-grid > div {
      padding: 10px;
      border: 1px solid #273548;
      border-radius: 6px;
      background: #0d151e;
    }

    .daily-action span,
    .daily-action small,
    .accuracy-grid span,
    .accuracy-grid small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .daily-action b {
      display: block;
      margin: 6px 0 4px;
      font-size: 17px;
    }

    .accuracy-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .accuracy-grid b {
      display: block;
      margin: 5px 0 3px;
      font-size: 21px;
    }

    .accuracy-grid b.safe { color: var(--red); }
    .accuracy-grid b.warn { color: var(--yellow); }
    .accuracy-grid b.danger { color: var(--green); }

    .measured-accuracy {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.45;
    }

    .measured-accuracy.ready { color: #b9eacc; background: rgba(40, 215, 111, .08); }
    .measured-accuracy.sampling { color: #e6cf9d; background: rgba(255, 189, 62, .08); }

    .market-risk-panel {
      margin-bottom: 14px;
      border: 1px solid #304356;
      border-radius: 8px;
      background: #111923;
      padding: 14px;
    }

    .market-risk-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .market-risk-head .section-title { margin-bottom: 3px; }
    .market-risk-head > div > span { color: var(--muted); font-size: 12px; }

    .market-index-grid,
    .market-risk-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .market-index-grid { margin-bottom: 8px; }

    .market-index-grid > div,
    .market-risk-grid > div {
      min-height: 72px;
      padding: 9px;
      border: 1px solid #273548;
      border-radius: 6px;
      background: #0d151e;
    }

    .market-index-grid span,
    .market-index-grid small,
    .market-risk-grid span,
    .market-risk-grid small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .market-index-grid b,
    .market-risk-grid b {
      display: block;
      margin: 6px 0 4px;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .market-risk-grid b.safe { color: var(--red); }
    .market-risk-grid b.warn { color: var(--yellow); }
    .market-risk-grid b.danger { color: var(--green); }

    .announcement-list {
      display: grid;
      gap: 6px;
      margin-top: 9px;
    }

    .announcement-list > div {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 8px;
      padding: 7px 9px;
      border-left: 3px solid #3b6688;
      border-radius: 5px;
      background: #0d151e;
      font-size: 12px;
      line-height: 1.4;
    }

    .announcement-list span { color: var(--muted); }

    .news-radar-panel {
      margin-bottom: 14px;
      border: 1px solid #31506a;
      border-radius: 8px;
      background: #0e1721;
      padding: 14px;
    }

    .news-radar-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .news-radar-head .section-title { margin-bottom: 3px; }
    .news-radar-head > div > span { color: var(--muted); font-size: 12px; }

    .news-radar-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .news-radar-controls textarea {
      min-height: 70px;
      resize: vertical;
    }

    .news-radar-controls button,
    .x-account-row button {
      min-width: 92px;
      border: 1px solid #31536f;
      border-radius: 6px;
      background: #15324a;
      color: #d9efff;
      font-weight: 800;
    }

    .x-account-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 9px;
    }

    .x-account-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .x-account-list > span {
      display: inline-flex;
      align-items: center;
      border: 1px solid #2b3e52;
      border-radius: 5px;
      background: #111d29;
      overflow: hidden;
    }

    .x-account-list a {
      color: #a9d6f5;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 800;
      text-decoration: none;
    }

    .x-account-list button {
      width: 26px;
      height: 26px;
      border: 0;
      border-left: 1px solid #2b3e52;
      background: transparent;
      color: #ff8794;
    }

    .x-account-list button svg { width: 13px; height: 13px; }

    .radar-list { display: grid; gap: 7px; }

    .radar-item {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: start;
      padding: 9px;
      border: 1px solid #243447;
      border-left: 3px solid #4f87b0;
      border-radius: 6px;
      background: #0a121a;
    }

    .radar-item.positive { border-left-color: var(--red); }
    .radar-item.negative { border-left-color: var(--green); }
    .radar-item.risk { border-left-color: var(--yellow); }

    .radar-source,
    .radar-item small { color: var(--muted); font-size: 11px; line-height: 1.4; }
    .radar-item b { display: block; margin-bottom: 5px; line-height: 1.45; }
    .radar-item a { color: #8fcfff; text-decoration: none; }

    .radar-remove {
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      color: #ff8794;
    }

    .radar-remove svg { width: 15px; height: 15px; }

    .confirmation-panel {
      margin-bottom: 14px;
      border: 1px solid #294058;
      border-radius: 8px;
      background: #101923;
      padding: 14px;
    }

    .confirmation-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .confirmation-head .section-title {
      margin-bottom: 3px;
    }

    .confirmation-head > div > span {
      color: var(--muted);
      font-size: 12px;
    }

    .confirm-summary {
      flex: 0 0 auto;
      border-radius: 5px;
      padding: 6px 8px;
      background: #172333;
      color: #b8c9dc;
      font-size: 12px;
      font-weight: 900;
    }

    .confirm-summary.safe { color: #80ffb1; background: rgba(40, 215, 111, .12); }
    .confirm-summary.warn { color: #ffd583; background: rgba(255, 189, 62, .13); }
    .confirm-summary.danger { color: #ff8794; background: rgba(255, 77, 99, .13); }

    .confirm-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid #223043;
      border-left: 1px solid #223043;
    }

    .confirm-item {
      min-height: 82px;
      padding: 10px;
      border-right: 1px solid #223043;
      border-bottom: 1px solid #223043;
      background: rgba(10, 17, 24, .42);
    }

    .confirm-item span,
    .confirm-item small {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .confirm-item b {
      display: block;
      margin: 7px 0 5px;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .confirm-item b.safe { color: var(--red); }
    .confirm-item b.warn { color: var(--yellow); }
    .confirm-item b.danger { color: var(--green); }

    .theory-panel {

  <script>
    const ACCESS_CODE = "88888888";
    const ACCESS_KEY = "stockAgentAccessGranted";

    function setupAccessGate() {
      const granted = localStorage.getItem(ACCESS_KEY) === "1";
      document.body.classList.toggle("locked", !granted);
      const input = document.getElementById("accessCodeInput");
      const btn = document.getElementById("accessCodeBtn");
      const error = document.getElementById("accessGateError");
      function unlock() {
        if ((input.value || "").trim() === ACCESS_CODE) {
          localStorage.setItem(ACCESS_KEY, "1");
          document.body.classList.remove("locked");
          error.textContent = "";
          generate();
        } else {
          error.textContent = "口令不对，请联系授权人。";
        }
      }
      btn.addEventListener("click", unlock);
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") unlock();
      });
    }

    const stockNames = {
      "603005": "晶方科技",
      "002185": "华天科技",
      "002436": "兴森科技",
      "600360": "华微电子",
      "603203": "快克智能",
      "300476": "胜宏科技",
      "000725": "京东方A",
      "600552": "凯盛科技",
      "002050": "三花智控",
      "600888": "新疆众和",
      "001287": "中电港"
    };

    const state = {
      mode: "auction",
      selected: "603005",
      codes: [],
      queryCodes: [],
      stocks: [],
      dataSource: "准备连接东财",
      simpleMode: true,
      refreshing: false,
      refreshIn: 20,
      lastSuccessAt: 0,
      lastError: "",
      phaseName: "实时看盘",
      phaseNote: "自动识别竞价、盘中和尾盘阶段",
      phaseKey: "preopen",
      trendCache: {},
      intradayCache: {},
      marketContext: null,
      announcementCache: {},
      forecastCache: {},
      researchCache: {},
      chartMode: "daily",
      mobilePoolOpen: false
    };

    function marketPhase(now = new Date()) {
      const day = now.getDay();
      const minutes = now.getHours() * 60 + now.getMinutes();
      if (day === 0 || day === 6) {
        return { mode: "close", key: "rest", name: "休市复盘", note: "非交易日 · 只做复盘，不生成实时买入指令" };
      }
      if (minutes < 9 * 60 + 15) {
        return { mode: "auction", key: "preopen", name: "盘前准备", note: "9:15 后自动进入集合竞价监控" };
      }
      if (minutes < 9 * 60 + 25) {
        return { mode: "auction", key: "auction", name: "集合竞价", note: "观察高开、竞价量和资金方向，暂不追价" };
      }
      if (minutes < 9 * 60 + 30) {
        return { mode: "auction", key: "auction_lock", name: "竞价定价", note: "竞价结果已形成，等待开盘承接验证" };
      }
      if (minutes < 9 * 60 + 35) {
        return { mode: "intraday", key: "opening_guard", name: "开盘过滤", note: "开盘前5分钟波动失真，只观察不追涨" };
      }
      if (minutes < 9 * 60 + 45) {
        return { mode: "intraday", key: "opening_confirm", name: "开盘确认", note: "验证竞价承接、量价和分时均价" };
      }
      if (minutes < 11 * 60 + 30) {
        return { mode: "intraday", key: "morning", name: "上午盘中", note: "按固定计划跟踪触发与失效" };
      }
      if (minutes < 13 * 60) {
        return { mode: "intraday", key: "lunch", name: "午间休市", note: "保留上午行情，暂停新的交易指令" };
      }
      if (minutes < 14 * 60 + 30) {
        return { mode: "intraday", key: "afternoon", name: "下午盘中", note: "按固定计划跟踪触发与失效" };
      }
      if (minutes < 14 * 60 + 50) {
        return { mode: "intraday", key: "late_session", name: "尾盘前确认", note: "降低追涨权重，优先处理持仓" };
      }
      if (minutes < 15 * 60) {
        return { mode: "close", key: "closing", name: "尾盘决策", note: "只做持仓与隔夜判断，不新开突破仓" };
      }
      return { mode: "close", key: "closed", name: "收盘复盘", note: "整理收盘强弱、验证信号并生成次日预案" };
    }

    function syncMarketPhase() {
      const phase = marketPhase();
      const changed = phase.key !== state.phaseKey;
      state.mode = phase.mode;
      state.phaseKey = phase.key;
      state.phaseName = phase.name;
      state.phaseNote = phase.note;
      return changed;
    }

    const modeCopy = {
      auction: {
        title: "竞价分析",
        status: "集合竞价重点看高开强度、封单变化、竞价成交额和开盘承接",
        actionName: "做T策略",
        metrics: ["池内强度", "池内红盘", "池内涨停", "池内成交额", "更新时间"]
      },
      intraday: {
        title: "盘中分析",
        status: "盘中重点看量能延续、回踩承接、突破有效性和大单方向",
        actionName: "盘中策略",
        metrics: ["池内强度", "池内红盘", "池内涨停", "池内成交额", "更新时间"]
      },
      close: {
        title: "尾盘复盘",
        status: "尾盘重点看收盘位置、尾盘抢筹、次日预期和隔夜风险",
        actionName: "明日预案",
        metrics: ["池内强度", "池内红盘", "池内涨停", "池内成交额", "更新时间"]
      }
    };

    function seededRandom(seed) {
      let h = 2166136261;
      for (let i = 0; i < seed.length; i++) {
        h ^= seed.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return () => {
        h += h << 13; h ^= h >>> 7;
        h += h << 3; h ^= h >>> 17;
        h += h << 5;
        return ((h >>> 0) % 10000) / 10000;
      };
    }

    function defaultCodes() {
      return ["603005", "002185", "002436", "600360", "603203", "300476"];
    }

    async function searchStockCode(keyword) {
      const term = String(keyword || "").trim();
      const directCode = term.replace(/\D/g, "");
      if (/^\d{6}$/.test(directCode)) return directCode;

      const normalized = term.replace(/\s+/g, "").toLowerCase();
      const localMatch = Object.entries(stockNames).find(([, name]) => {
        const candidate = name.replace(/\s+/g, "").toLowerCase();
        return candidate === normalized;
      });
      if (localMatch) return localMatch[0];

      const url = `https://searchapi.eastmoney.com/api/suggest/get?input=${encodeURIComponent(term)}&type=14&token=D43BF722C8E33BDC906FB84D85E326E8&count=10`;
      const data = await eastmoneyJsonp(url, 7000);
      const rows = data?.QuotationCodeTable?.Data || [];
      const aShares = rows.filter(row => row.Classify === "AStock" && /^\d{6}$/.test(row.Code));
      const exact = aShares.find(row => String(row.Name || "").replace(/\s+/g, "").toLowerCase() === normalized);
      const match = exact || aShares[0];
      if (!match) throw new Error(`没有找到“${term}”对应的A股`);
      stockNames[match.Code] = match.Name || stockNames[match.Code] || term;
      return match.Code;
    }

    async function resolveStockInputs(value) {
      const terms = String(value || "")
        .split(/[,\s，、;；]+/)
        .map(term => term.trim())
        .filter(Boolean);
      if (!terms.length) return [];
      const codes = await Promise.all(terms.map(searchStockCode));
      return [...new Set(codes)];
    }

    function loadSavedCodes() {
      try {
        const saved = JSON.parse(localStorage.getItem("stockAgentCodes") || "[]");
        return Array.isArray(saved) && saved.length ? saved : defaultCodes();
      } catch {
        return defaultCodes();
      }
    }

    function saveCodes() {
      localStorage.setItem("stockAgentCodes", JSON.stringify(state.codes));
    }

    function syncCodeInput(value = "") {
      document.getElementById("codesInput").value = value;
    }

    function holdingKey(code) {
      return `stockAgentHolding:${code}`;
    }

    function readHolding(code) {
      try {
        return JSON.parse(localStorage.getItem(holdingKey(code)) || "{}");
      } catch {
        return {};
      }
    }

    function saveHolding(code, holding) {
      localStorage.setItem(holdingKey(code), JSON.stringify(holding));
    }

    function loadSimpleMode() {
      const saved = localStorage.getItem("stockAgentSimpleMode");
      state.simpleMode = saved === null ? true : saved === "1";
    }

    function saveSimpleMode() {
      localStorage.setItem("stockAgentSimpleMode", state.simpleMode ? "1" : "0");
    }

    function tradingDayKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function executionPlanKey(code) {
      return `stockAgentExecutionPlan:${tradingDayKey()}:${code}`;
    }

    function calibrationPhaseReached() {
      return !["preopen", "auction", "auction_lock"].includes(state.phaseKey);
    }

    function buildExecutionPlan(stock, options = {}) {
      const digits = priceDigits(stock.price);
      const trend = stock.trendData;
      const anchorPrice = options.anchorPrice || stock.prevClose || stock.price;
      const atrPct = Math.max(1.5, Math.min(6, trend?.atr14 || stock.amplitude || 3));
      const atr = anchorPrice * atrPct / 100;
      const supports = [trend?.ma5, trend?.ma10, stock.low]
        .filter(value => Number(value) > 0 && value < anchorPrice * .998);
      const structuralSupport = supports.length ? Math.max(...supports) : anchorPrice - atr * .65;
      const support = Math.min(anchorPrice - atr * .15, Math.max(anchorPrice - atr * .85, structuralSupport));
      const buyLow = +(support - atr * .15).toFixed(digits);
      const buyHigh = +Math.min(anchorPrice, support + atr * .12).toFixed(digits);
      const breakout = +Math.max(stock.high || 0, anchorPrice + atr * .72).toFixed(digits);
      const target1 = +Math.max(breakout, anchorPrice + atr * 1.15).toFixed(digits);
      const target2 = +Math.max(target1 + atr * .45, anchorPrice + atr * 1.9).toFixed(digits);
      const stop = +Math.max(.01, buyLow - atr * .55).toFixed(digits);
      const calibratedNow = options.calibrated === true || calibrationPhaseReached();
      return {
        version: 2,
        date: tradingDayKey(),
        code: stock.code,
        createdAt: Date.now(),
        anchorPrice: +anchorPrice.toFixed(digits),
        atr: +atr.toFixed(digits),
        atrPct: +atrPct.toFixed(2),
        usesTrendData: Boolean(trend),
        buyLow,
        buyHigh,
        breakout,
        noChaseAbove: +(breakout + atr * .3).toFixed(digits),
        target1,
        target2,
        stop,
        protectStop: +Math.max(buyHigh, target1 - atr * .5).toFixed(digits),
        stage: calibratedNow ? "locked" : "preplan",
        calibratedAt: calibratedNow ? Date.now() : 0,
        recalibrated: false,
        calibrationReason: calibratedNow ? (options.reason || "首次打开时已过9:35，按当前结构建立并锁定") : "等待9:35开盘验证",
        events: {}
      };
    }

    function calibrateExecutionPlan(stock, plan) {
      if (plan.calibratedAt || !calibrationPhaseReached()) return plan;
      const gapPct = Math.abs(stock.openPct || 0);
      const normalGap = Math.max(1.5, (plan.atrPct || 3) * .65);
      const openInvalid = stock.open <= plan.stop || stock.open >= plan.noChaseAbove;
      const priceInvalid = stock.price <= plan.stop || stock.price >= plan.noChaseAbove;
      const shouldRebuild = gapPct >= normalGap || openInvalid || priceInvalid;
      if (shouldRebuild) {
        const anchorPrice = (stock.open || stock.price) * .6 + stock.price * .4;
        const rebuilt = buildExecutionPlan(stock, {
          anchorPrice,
          calibrated: true,
          reason: gapPct >= normalGap
            ? `开盘偏离${gapPct.toFixed(1)}%，超过正常阈值${normalGap.toFixed(1)}%`
            : "原预案开盘即落在失效区"
        });
        return {
          ...rebuilt,
          createdAt: plan.createdAt,
          preplan: {
            buyLow: plan.buyLow,
            buyHigh: plan.buyHigh,
            breakout: plan.breakout,
            stop: plan.stop
          },
          recalibrated: true,
          events: plan.events || {}
        };
      }
      return {
        ...plan,
        stage: "locked",
        calibratedAt: Date.now(),
        recalibrated: false,
        calibrationReason: `开盘偏离${gapPct.toFixed(1)}%，未超过${normalGap.toFixed(1)}%，确认原预案`
      };
    }

    function getExecutionPlan(stock) {
      let plan;
      let planChanged = false;
      try {
        plan = JSON.parse(localStorage.getItem(executionPlanKey(stock.code)) || "null");
      } catch {
        plan = null;
      }
      if (!plan || plan.date !== tradingDayKey() || plan.version !== 2) {
        plan = buildExecutionPlan(stock);
        planChanged = true;
      }
      if (plan.stage === "preplan" && !plan.usesTrendData && stock.trendData) {
        const enriched = buildExecutionPlan(stock, { anchorPrice: plan.anchorPrice });
        plan = {
          ...enriched,
          createdAt: plan.createdAt,
          events: plan.events || {},
          calibrationReason: "日线与ATR已就绪，盘前预案已补全，等待9:35验证"
        };
        planChanged = true;
      }
      const calibrated = calibrateExecutionPlan(stock, plan);
      const changed = planChanged || calibrated !== plan;
      plan = calibrated;
      if (state.lastSuccessAt && stock.source === "东方财富" && (!localStorage.getItem(executionPlanKey(stock.code)) || changed)) {
        localStorage.setItem(executionPlanKey(stock.code), JSON.stringify(plan));
      }
      return plan;
    }

    function planLockStatus(plan) {
      if (plan.stage === "preplan") return `盘前预案 · ${plan.calibrationReason}`;
      if (plan.recalibrated) return `9:35已唯一校准 · ${plan.calibrationReason}`;
      return `9:35已锁定 · ${plan.calibrationReason}`;
    }

    function updateExecutionPlanEvents(stock, plan) {
      if (!state.lastSuccessAt || stock.source !== "东方财富") return plan;
      const holding = readHolding(stock.code);
      const hasHolding = Number(holding.cost) > 0 && Number(holding.shares) > 0;
      const checks = {
        buyZone: stock.price >= plan.buyLow && stock.price <= plan.buyHigh,
        breakout: stock.price >= plan.breakout,
        target1: hasHolding && stock.price >= plan.target1,
        target2: hasHolding && stock.price >= plan.target2,
        stop: stock.price <= plan.stop
      };
      let changed = false;
      Object.entries(checks).forEach(([name, hit]) => {
        if (hit && !plan.events?.[name]) {
          plan.events ||= {};
          plan.events[name] = { time: Date.now(), price: stock.price };
          changed = true;
        }
      });
      if (changed) localStorage.setItem(executionPlanKey(stock.code), JSON.stringify(plan));
      return plan;
    }

    function resetExecutionPlan(code) {
      const confirmed = window.confirm("只有除权、复牌、行情数据异常或原计划明显失真时才应重建。确认作废今天已锁定的计划吗？");
      if (!confirmed) return;
      localStorage.removeItem(executionPlanKey(code));
      render();
    }

    function executionSignal(stock, plan) {
      const holding = readHolding(stock.code);
      const hasHolding = Number(holding.cost) > 0 && Number(holding.shares) > 0;
      const confirmation = confirmationStatus(stock);
      const spike = analyzeStraightLine(stock);
      const dataQuality = dataQualityStatus(stock);
      const riskReward = riskRewardStatus(plan);
      const permission = phasePermission(hasHolding);
      const market = marketRegimeStatus(stock);
      const eventRisk = announcementRiskStatus(stock);
      const portfolio = portfolioRiskStatus();
      const cycle = analyzeCycleStrategies(stock);
      if (stock.stRiskLevel === "高") return ["风险排除", "基本面/ST风险高", "不参与交易"];
      if (dataQuality.score < 65) return ["暂停策略", `数据可信度仅${dataQuality.score}分`, "等待真实行情、分钟线和日线恢复"];
      if (hasHolding) {
        if (stock.price <= plan.stop) return ["止损触发", `跌破固定止损 ${plan.stop}`, "优先执行风控"];
        if (stock.price >= plan.target2) return ["止盈触发", `到达第二目标 ${plan.target2}`, "分批兑现剩余仓位"];
        if (stock.price >= plan.target1) return ["减仓触发", `到达第一目标 ${plan.target1}`, "先兑现一部分"];
        if (plan.events?.target1 && stock.price <= plan.protectStop) return ["保护止盈触发", `一档止盈后回落至保护线 ${plan.protectStop}`, "处理剩余仓位，不上移目标价"];
        if (eventRisk.level === "高") return ["公告风险预警", eventRisk.label, "先核查公告，再决定是否继续持有"];
        if (cycle?.topLevel === "高") return ["逃顶减仓预警", cycle.topHits.map(item => item.text).join("、"), "分批兑现，不一次清仓；跌破MA5继续减"];
        if (spike?.detected && spike.decayRisk >= 65) return ["回落减仓预警", `直线拉升后回落风险 ${spike.decayRisk}分`, "可先降低仓位保护利润"];
        return ["持有观察", `卖点 ${plan.target1}/${plan.target2} 未到`, `跌破 ${plan.stop} 执行止损`];
      }
      if (stock.price <= plan.stop) return ["计划失效", `跌破固定止损 ${plan.stop}`, "今日不再开仓"];
      if (spike?.detected && spike.decayRisk >= 65) return ["直线诱多风险", `冲高后回落风险 ${spike.decayRisk}分`, "不追高，等待重新企稳"];
      if (eventRisk.level === "高") return ["事件风险禁入", eventRisk.label, "公告风险未解除前不新开仓"];
      if (portfolio.level === "高") return ["组合风险禁入", `单票${portfolio.topWeight}% / 行业${portfolio.industryWeight}%`, "先降低集中度，再考虑新开仓"];
      if (!permission.allowed) return [permission.label, permission.reason, "保持固定计划，等待可交易时段"];
      if (market.blockNewBuy) return ["市场环境禁入", `${market.label}，大盘均值${market.indexAvg}%`, "停止新开仓"];
      if (stock.price >= plan.buyLow && stock.price <= plan.buyHigh) {
        const quality = strategyQualityStatus(stock, plan);
        if (!riskReward.lowPass) return ["盈亏比不足", `低吸计划盈亏比仅${riskReward.low}`, "低于1.3，不执行"];
        if (stock.net >= 0 && stock.score >= 60 && confirmation.count >= 2 && quality.score >= 65) return ["低吸触发", `固定区到达，质量${quality.score}分，${confirmation.count}/4项确认`, "按计划小仓确认"];
        return ["到价未确认", `已进低吸区，仅${confirmation.count}/4项指标确认`, "等量能与资金改善"];
      }
      if (stock.price >= plan.breakout) {
        if (stock.price > plan.noChaseAbove) return ["今日错过", `已高于追价上限 ${plan.noChaseAbove}`, "不再移动买点追高"];
        if (market.blockBreakout) return ["突破环境不足", `${market.label}${market.sector ? `，${market.sector.name}${market.sector.chg}%` : ""}`, "不执行突破追涨"];
        const quality = strategyQualityStatus(stock, plan);
        if (!riskReward.breakoutPass) return ["盈亏比不足", `突破计划盈亏比仅${riskReward.breakout}`, "低于1.5，不执行"];
        if (stock.net >= 0 && stock.score >= 70 && confirmation.count >= 3 && quality.score >= 75) return ["突破触发", `固定突破成立，质量${quality.score}分，${confirmation.count}/4项确认`, "按计划试仓"];
        return ["突破未确认", `价格突破但仅${confirmation.count}/4项指标确认`, "暂不买入"];
      }
      if (stock.price < plan.buyLow) return ["等待企稳", `现价低于固定低吸区 ${plan.buyLow}`, "不急着接下跌"];
      return ["等待触发", `低吸区 ${plan.buyLow}-${plan.buyHigh} / 突破 ${plan.breakout}`, "今日价位保持不变"];
    }

    function planEventText(plan) {
      const labels = { buyZone: "低吸区", breakout: "突破", target1: "一档止盈", target2: "二档止盈", stop: "止损" };
      const items = Object.entries(plan.events || {}).map(([name, event]) => {
        const time = new Date(event.time).toLocaleTimeString("zh-CN", { hour12: false, hour: "2-digit", minute: "2-digit" });
        return `${labels[name]} ${time}@${event.price}`;
      });
      return items.length ? `今日已触发：${items.join(" · ")}` : "今日尚未触发固定价位";
    }

    function dataQualityStatus(stock) {
      let score = 100;
      const reasons = [];
      const quoteAge = state.lastSuccessAt ? (Date.now() - state.lastSuccessAt) / 1000 : Infinity;
      const trendAge = stock.trendData?.fetchedAt ? (Date.now() - stock.trendData.fetchedAt) / 1000 : Infinity;
      const minuteAge = stock.intradayData?.fetchedAt ? (Date.now() - stock.intradayData.fetchedAt) / 1000 : Infinity;
      if (stock.source !== "东方财富") {
        score -= 65;
        reasons.push("非东财真实行情");
      }
      if (!stock.price || !stock.amount) {
        score -= 30;
        reasons.push("价格或成交额异常");
      }
      if (quoteAge > 45) {
        score -= 30;
        reasons.push(`报价延迟${Math.round(quoteAge)}秒`);
      }
      if (state.lastError) {
        score -= 40;
        reasons.push("最近一次刷新失败");
      }
      if (trendAge > 10 * 60) {
        score -= 10;
        reasons.push("日线指标未就绪");
      }
      if (minuteAge > 60) {
        score -= 15;
        reasons.push("分钟线未就绪");
      }
      if (!state.marketContext?.indices?.length) {
        score -= 10;
        reasons.push("市场板块数据未就绪");
      }
      if (!Array.isArray(stock.announcements)) {
        score -= 10;
        reasons.push("公告风险数据未就绪");
      }
      score = Math.max(0, Math.min(100, Math.round(score)));
      return {
        score,
        label: score >= 85 ? "数据可靠" : score >= 65 ? "数据可用" : "数据不足",
        cls: score >= 85 ? "safe" : score >= 65 ? "warn" : "danger",
        reasons: reasons.length ? reasons : ["报价、分钟线和日线数据均正常"]
      };
    }

    function riskRewardStatus(plan) {
      const lowEntry = (plan.buyLow + plan.buyHigh) / 2;
      const lowRisk = Math.max(.001, lowEntry - plan.stop);
      const lowReward = Math.max(0, plan.target1 - lowEntry);
      const breakoutStop = Math.max(plan.buyHigh, +(plan.breakout * .975).toFixed(3));
      const breakoutRisk = Math.max(.001, plan.breakout - breakoutStop);
      const breakoutReward = Math.max(0, plan.target2 - plan.breakout);
      return {
        low: +(lowReward / lowRisk).toFixed(2),
        breakout: +(breakoutReward / breakoutRisk).toFixed(2),
        breakoutStop,
        lowPass: lowReward / lowRisk >= 1.3,
        breakoutPass: breakoutReward / breakoutRisk >= 1.5
      };
    }

    function phasePermission(hasHolding = false) {
      if (hasHolding) return { allowed: true, label: "持仓管理", reason: "持仓风控在所有时段优先" };
      const rules = {
        opening_confirm: "开盘确认期，只执行充分确认的固定计划",
        morning: "上午盘中，可按固定计划执行",
        afternoon: "下午盘中，可按固定计划执行"
      };
      if (rules[state.phaseKey]) return { allowed: true, label: "允许候选", reason: rules[state.phaseKey] };
      const reason = {
        preopen: "盘前只生成计划",
        auction: "集合竞价只观察，不追价",
        auction_lock: "等待开盘承接确认",
        opening_guard: "开盘前5分钟波动失真",
        lunch: "午间休市",
        late_session: "尾盘前降低新开仓权重",
        closing: "尾盘只处理持仓与隔夜风险",
        closed: "已收盘，只做复盘",
        rest: "非交易日，只做复盘"
      }[state.phaseKey] || "当前时段不生成新开仓指令";
      return { allowed: false, label: "时段观察", reason };
    }

    function strategyQualityStatus(stock, plan) {
      const data = dataQualityStatus(stock);
      const confirmation = confirmationStatus(stock);
      const theory = analyzeTheorySet(stock);
      const spike = analyzeStraightLine(stock);
      const rr = riskRewardStatus(plan);
      const market = marketRegimeStatus(stock);
      const eventRisk = announcementRiskStatus(stock);
      const theoryScore = theory ? Math.max(0, Math.min(15, (theory.totalScore + 5) * 1.5)) : 7.5;
      const rrScore = Math.min(15, Math.max(rr.low, rr.breakout) / 2 * 15);
      const spikeScore = spike?.detected ? Math.max(0, 5 - spike.decayRisk / 20) : 3.5;
      const marketScore = market.score / 10;
      let score = data.score * .3 + (confirmation.count / confirmation.total) * 25 + theoryScore + rrScore + spikeScore + marketScore;
      if (stock.stRiskLevel === "高") score = Math.min(score, 25);
      if (eventRisk.level === "高") score = Math.min(score, 30);
      score = Math.max(0, Math.min(100, Math.round(score)));
      return {
        score,
        data,
        confirmation,
        theory,
        spike,
        market,
        eventRisk,
        rr,
        label: score >= 80 ? "高质量候选" : score >= 65 ? "中等质量" : "低质量/等待",
        cls: score >= 80 ? "safe" : score >= 65 ? "warn" : "danger"
      };
    }

    function signalLedgerKey() {
      return "stockAgentSignalLedgerV2";
    }

    function readSignalLedger() {
      try {
        return JSON.parse(localStorage.getItem(signalLedgerKey()) || "[]");
      } catch {
        return [];
      }
    }

    function saveSignalLedger(items) {
      localStorage.setItem(signalLedgerKey(), JSON.stringify(items.slice(0, 120)));
    }

    function minuteTimestamp(value) {
      return Date.parse(`${String(value).replace(" ", "T")}:00+08:00`);
    }

    function trackStrategySignal(stock) {
      if (["preopen", "auction", "auction_lock", "rest"].includes(state.phaseKey) || stock.source !== "东方财富") return;
      const plan = getExecutionPlan(stock);
      const action = executionSignal(stock, plan);
      const cycle = analyzeCycleStrategies(stock);
      const ledger = readSignalLedger();
      const quality = strategyQualityStatus(stock, plan);
      const candidates = [];
      if (/低吸触发|突破触发|回落减仓预警|止损触发|减仓触发|止盈触发|保护止盈触发|直线诱多风险/.test(action[0])) {
        candidates.push({ action: action[0], direction: /低吸触发|突破触发/.test(action[0]) ? "up" : "down" });
      }
      if (cycle?.topLevel === "高") candidates.push({ action: "逃顶策略", direction: "down" });
      if (cycle?.bottomReady) candidates.push({ action: "抄底策略", direction: "up" });
      if (cycle?.dayTState === "日内T卖点观察") candidates.push({ action: "日内T卖点", direction: "down" });
      if (cycle?.dayTState === "日内T接回观察") candidates.push({ action: "日内T接回", direction: "up" });
      if (cycle?.waveState === "波段T减仓区") candidates.push({ action: "波段T卖点", direction: "down" });
      let changed = false;
      candidates.forEach(candidate => {
        const id = `${tradingDayKey()}-${stock.code}-${candidate.action}`;
        if (ledger.some(item => item.id === id)) return;
        ledger.unshift({
          id,
          date: tradingDayKey(),
          code: stock.code,
          name: stock.name,
          action: candidate.action,
          direction: candidate.direction,
          ts: Date.now(),
          price: stock.price,
          quality: quality.score,
          outcomes: {}
        });
        changed = true;
      });
      if (changed) saveSignalLedger(ledger);
    }

    function evaluateSignalLedger(stock) {
      const ledger = readSignalLedger();
      const bars = stock.intradayData?.bars || [];
      const dailyBars = stock.trendData?.bars || [];
      let changed = false;
      ledger.forEach(item => {
        if (item.code !== stock.code) return;
        if (item.date === tradingDayKey() && bars.length) {
          [5, 15, 30].forEach(minutes => {
            if (item.outcomes?.[minutes]) return;
            const target = item.ts + minutes * 60 * 1000;
            if (Date.now() < target) return;
            const bar = bars.find(candidate => minuteTimestamp(candidate.time) >= target);
            if (!bar) return;
            const price = bar.close;
            const change = item.price ? ((price / item.price) - 1) * 100 : 0;
            item.outcomes ||= {};
            item.outcomes[minutes] = {
              price,
              change: +change.toFixed(2),
              hit: item.direction === "up" ? change > 0 : change < 0
            };
            changed = true;
          });
        }
        if (dailyBars.length) {
          const nextIndex = dailyBars.findIndex(bar => bar.date > item.date);
          [["d1", nextIndex], ["d5", nextIndex >= 0 ? nextIndex + 4 : -1]].forEach(([key, index]) => {
            if (item.outcomes?.[key] || index < 0 || !dailyBars[index]) return;
            const price = dailyBars[index].close;
            const change = item.price ? ((price / item.price) - 1) * 100 : 0;
            item.outcomes ||= {};
            item.outcomes[key] = {
              price,
              date: dailyBars[index].date,
              change: +change.toFixed(2),
              hit: item.direction === "up" ? change > 0 : change < 0
            };
            changed = true;
          });
        }
      });
      if (changed) saveSignalLedger(ledger);
    }

    function measuredAccuracyStats() {
      const ledger = readSignalLedger();
      const evaluated = ledger.filter(item => item.outcomes?.[15]);
      const hits = evaluated.filter(item => item.outcomes[15].hit).length;
      const averageChange = evaluated.length
        ? evaluated.reduce((sum, item) => sum + (item.outcomes[15].change || 0) * (item.direction === "up" ? 1 : -1), 0) / evaluated.length
        : 0;
      return {
        totalSignals: ledger.length,
        samples: evaluated.length,
        hits,
        winRate: evaluated.length ? Math.round(hits / evaluated.length * 100) : 0,
        averageChange: +averageChange.toFixed(2),
        reliable: evaluated.length >= 10
      };
    }

    function ledgerHorizonStats(horizon, code = "", action = "") {
      const evaluated = readSignalLedger().filter(item => (!code || item.code === code) && (!action || item.action === action) && item.outcomes?.[horizon]);
      const hits = evaluated.filter(item => item.outcomes[horizon].hit).length;
      return {
        samples: evaluated.length,
        hits,
        rate: evaluated.length ? Math.round(hits / evaluated.length * 100) : 0
      };
    }

      if (!outcome) return `<span>待验证</span>`;

      else if (actionableBuy && quality.score >= 80) position = "2-3成试仓";

      const status = actionableBuy || actionableSell ? "执行信号" : /暂停|不足|风险|错过|禁入|失效/.test(action[0]) ? "禁止执行" : "等待信号";

    function estimatedLimitPct(stock) {
      if (/(^|[^A-Z])\*?ST/i.test(stock.name || "")) return 5;
      if (/^(300|301|688)/.test(stock.code)) return 20;
      if (/^[48]/.test(stock.code)) return 30;
      return 10;
    }

    function analyzeStraightLine(stock) {
      const minuteData = stock.intradayData;
      const bars = minuteData?.bars?.filter(bar => bar.close > 0) || [];
      if (bars.length < 10) return null;
      let best = null;
      const windows = [3, 5, 8];
      for (let end = 2; end < bars.length; end++) {
        windows.forEach(windowSize => {
          const start = end - windowSize + 1;
          if (start < 0) return;
          const section = bars.slice(start, end + 1);
          const startPrice = section[0].open || section[0].close;
          const endPrice = section.at(-1).close;
          const risePct = startPrice ? ((endPrice / startPrice) - 1) * 100 : 0;
          let path = 0;
          let nonDown = 0;
          for (let index = 1; index < section.length; index++) {
            path += Math.abs(section[index].close - section[index - 1].close);
            if (section[index].close >= section[index - 1].close) nonDown += 1;
          }
          const efficiency = path ? Math.abs(endPrice - startPrice) / path : 0;
          const nonDownRatio = section.length > 1 ? nonDown / (section.length - 1) : 0;
          const prior = bars.slice(Math.max(0, start - 20), start);
          const priorVolume = average(prior.map(bar => bar.volume));
          const sectionVolume = average(section.map(bar => bar.volume));
          const volumeMultiple = priorVolume ? sectionVolume / priorVolume : 1;
          const quality = risePct * efficiency * nonDownRatio * (1 + Math.min(3, volumeMultiple) * .12);
          if (risePct >= 1.2 && efficiency >= .65 && nonDownRatio >= .65 && (!best || quality > best.quality)) {
            best = { start, end, windowSize, startPrice, endPrice, risePct, efficiency, nonDownRatio, sectionVolume, volumeMultiple, quality };
          }
        });
      }
      if (!best) return { detected: false, conclusion: "未检测到明显直线拉升", detail: "近3/5/8分钟没有同时满足涨幅、方向效率和连续上行条件。" };

      const after = bars.slice(best.end + 1);
      const fromSpike = bars.slice(best.start);
      const peak = Math.max(...fromSpike.map(bar => bar.high));
      const current = bars.at(-1).close;
      const pullbackPct = peak ? ((peak - current) / peak) * 100 : 0;
      const retained = peak > best.startPrice ? ((current - best.startPrice) / (peak - best.startPrice)) * 100 : 0;
      const postVolume = average(after.map(bar => bar.volume));
      const postVolumeRatio = best.sectionVolume ? postVolume / best.sectionVolume : 0;
      const avgPrice = bars.at(-1).avgPrice || current;
      const limitPct = estimatedLimitPct(stock);
      const previousClose = minuteData.preClose || stock.prevClose || current;
      const limitPrice = +(previousClose * (1 + limitPct / 100)).toFixed(priceDigits(stock.price));
      const distanceToLimit = current ? Math.max(0, ((limitPrice - current) / current) * 100) : 100;
      const minutesSince = bars.length - 1 - best.end;

      let sealScore = 20;
      if (distanceToLimit <= .5) sealScore += 30;
      else if (distanceToLimit <= 1.5) sealScore += 22;
      else if (distanceToLimit <= 3) sealScore += 14;
      else if (distanceToLimit <= 5) sealScore += 6;
      if (retained >= 85) sealScore += 15;
      else if (retained >= 65) sealScore += 8;
      else sealScore -= 6;
      if (pullbackPct <= .6) sealScore += 15;
      else if (pullbackPct <= 1.2) sealScore += 8;
      else if (pullbackPct > 2) sealScore -= 12;
      if (best.volumeMultiple >= 1.5) sealScore += 10;
      if (stock.mainNetRatio >= 3) sealScore += 10;
      else if (stock.mainNetRatio > 0) sealScore += 5;
      else sealScore -= 12;
      if (stock.volumeRatio >= 1.3) sealScore += 5;
      if (current >= avgPrice) sealScore += 5;
      else sealScore -= 6;
      sealScore = Math.max(0, Math.min(100, Math.round(sealScore)));

      let decayRisk = 5;
      if (pullbackPct > 2) decayRisk += 35;
      else if (pullbackPct > 1) decayRisk += 20;
      if (retained < 35) decayRisk += 35;
      else if (retained < 60) decayRisk += 20;
      if (stock.mainNetRatio < 0) decayRisk += 20;
      if (current < avgPrice) decayRisk += 15;
      if (after.length && postVolumeRatio > .8 && pullbackPct > .8) decayRisk += 10;
      if (minutesSince > 15 && retained < 70) decayRisk += 10;
      decayRisk = Math.max(0, Math.min(100, Math.round(decayRisk)));

      let conclusion = "冲高震荡，等待二次确认";
      let cls = "warn";
      if (current >= limitPrice * .998) {
        conclusion = "已到涨停附近，观察封单稳定性";
        cls = "safe";
      } else if (sealScore >= 70 && decayRisk < 45) {
        conclusion = "封板延续条件较强";
        cls = "safe";
      } else if (decayRisk >= 60) {
        conclusion = "直线拉升后回落风险高";
        cls = "danger";
      }
      return {
        detected: true,
        conclusion,
        cls,
        sealScore,
        decayRisk,
        risePct: +best.risePct.toFixed(2),
        duration: best.windowSize,
        startTime: bars[best.start].time.slice(-5),
        endTime: bars[best.end].time.slice(-5),
        volumeMultiple: +best.volumeMultiple.toFixed(2),
        pullbackPct: +pullbackPct.toFixed(2),
        retained: Math.max(0, Math.min(120, Math.round(retained))),
        distanceToLimit: +distanceToLimit.toFixed(2),
        limitPrice,
        avgPrice,
        aboveAvg: current >= avgPrice,
        minutesSince,
        postVolumeRatio: +postVolumeRatio.toFixed(2)
      };
    }

    function renderStraightLinePanel(stock) {
      const analysis = analyzeStraightLine(stock);
      if (!analysis) {
        return `<section class="spike-panel"><div class="section-title"><i data-lucide="move-up-right"></i>直线拉升与封板判断</div><span class="code">正在获取当日分钟线...</span></section>`;

            <div><span>拉升量能</span><b>${analysis.volumeMultiple}倍</b><small>相对拉升前均量</small></div>
            <div><span>分时均价</span><b>${analysis.aboveAvg ? "均价上方" : "跌破均价"}</b><small>均价 ${analysis.avgPrice}</small></div>

          <div class="spike-note ${analysis.cls}">${analysis.conclusion}。封板还需盘口封单持续，当前判断依据分钟量价与资金，不把一次直线拉升直接等同于涨停。</div>
        </section>
      `;
    }

    async function fetchMarketContext() {
      const indexFields = "f2,f3,f4,f6,f12,f14";
      const sectorFields = "f12,f14,f2,f3,f62,f104,f105,f128,f136";
      const [indexData, sectorData] = await Promise.all([
        eastmoneyJsonp(`https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=1.000001,0.399001,0.399006&fields=${indexFields}`),
        eastmoneyJsonp(`https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=500&po=1&np=1&fltt=2&fid=f3&fs=m:90+t:2+f:!50&fields=${sectorFields}`, 10000)
      ]);
      const indices = (indexData?.data?.diff || []).map(row => ({
        code: row.f12,
        name: row.f14,
        price: asNumber(row.f2),
        chg: asNumber(row.f3),
        amount: asNumber(row.f6)
      }));
      const sectors = (sectorData?.data?.diff || []).map((row, index) => ({
        code: row.f12,
        name: row.f14,
        chg: asNumber(row.f3),
        net: asNumber(row.f62),
        upCount: asNumber(row.f104),
        downCount: asNumber(row.f105),
        leader: row.f128 || "--",
        leaderChg: asNumber(row.f136),
        rank: index + 1
      }));
      return { fetchedAt: Date.now(), indices, sectors };
    }

    async function getMarketContext() {
      if (state.marketContext && Date.now() - state.marketContext.fetchedAt < 60 * 1000) return state.marketContext;
      state.marketContext = await fetchMarketContext();
      return state.marketContext;
    }

    function normalizeIndustryName(value) {
      return String(value || "").replace(/[ⅠⅡⅢIV\s]/g, "").replace(/行业|板块/g, "").toLowerCase();
    }

    function fmtFundFlow(value) {
      const amount = asNumber(value);
      return `${amount >= 0 ? "+" : ""}${(amount / 100000000).toFixed(2)}亿`;
    }

    function sectorContextFor(stock) {
      const sectors = state.marketContext?.sectors || [];
      const target = normalizeIndustryName(stock.industry);
      if (!target) return null;
      return sectors.find(sector => {
        const name = normalizeIndustryName(sector.name);
        return name === target || name.includes(target) || target.includes(name);
      }) || null;
    }

    function marketRegimeStatus(stock) {
      const context = state.marketContext;
      if (!context?.indices?.length) return { score: 50, label: "市场数据加载中", cls: "warn", blockBreakout: false, blockNewBuy: false, indexAvg: 0, sector: null };
      const indexAvg = average(context.indices.map(index => index.chg));
      const sector = sectorContextFor(stock);
      let score = 50 + indexAvg * 10;
      if (sector) {
        score += sector.chg * 5;
        score += sector.net > 0 ? 6 : sector.net < 0 ? -6 : 0;
        score += sector.upCount > sector.downCount ? 4 : -4;
      }
      score = Math.max(0, Math.min(100, Math.round(score)));

      if (!Array.isArray(stock.announcements)) {
        return { level: "未知", cls: "warn", risks: [], positives: [], recent: [], label: "公告数据尚未加载" };
      }
      const items = stock.announcements;
      const riskPattern = /减持|立案|调查|问询|风险提示|退市|诉讼|冻结|质押|亏损|下修|解禁|处罚|停牌|终止|异常波动|监管/;
      const positivePattern = /增持|回购|中标|预增|分红|业绩增长/;
      const recent = items.filter(item => {
        const timestamp = Date.parse(`${item.date}T00:00:00+08:00`);
        return Number.isFinite(timestamp) && Date.now() - timestamp <= 30 * 24 * 60 * 60 * 1000;
      });
      const risks = recent.filter(item => riskPattern.test(item.title));
      const positives = recent.filter(item => positivePattern.test(item.title));
      return {
        level: risks.length >= 2 ? "高" : risks.length === 1 ? "中" : "低",
        cls: risks.length >= 2 ? "danger" : risks.length === 1 ? "warn" : "safe",
        risks,
        positives,
        recent,
        label: risks.length ? `近30日发现${risks.length}条风险公告` : "近30日未识别重大风险公告"
      };

    function portfolioRiskStatus() {
      const positions = state.stocks.map(stock => {
        const holding = readHolding(stock.code);
        const shares = Number(holding.shares) || 0;
        const cost = Number(holding.cost) || 0;
        return {
          stock,
          shares,
          cost,
          value: shares * stock.price,
          profit: shares && cost ? shares * (stock.price - cost) : 0
        };
      }).filter(position => position.shares > 0 && position.value > 0);
      const totalValue = positions.reduce((sum, position) => sum + position.value, 0);
      const totalProfit = positions.reduce((sum, position) => sum + position.profit, 0);
      const topPosition = positions.reduce((top, position) => !top || position.value > top.value ? position : top, null);
      const topWeight = totalValue && topPosition ? topPosition.value / totalValue * 100 : 0;
      const industries = {};
      positions.forEach(position => {
        const industry = position.stock.industry || "未知行业";
        industries[industry] = (industries[industry] || 0) + position.value;
      });
      const topIndustry = Object.entries(industries).sort((a, b) => b[1] - a[1])[0];
      const industryWeight = totalValue && topIndustry ? topIndustry[1] / totalValue * 100 : 0;
      const highRisk = topWeight > 45 || industryWeight > 60;
      return {
        positions,
        totalValue,
        totalProfit,
        topPosition,
        topWeight: +topWeight.toFixed(1),
        topIndustry: topIndustry?.[0] || "--",
        industryWeight: +industryWeight.toFixed(1),
        level: highRisk ? "高" : topWeight > 35 || industryWeight > 45 ? "中" : "低",
        cls: highRisk ? "danger" : topWeight > 35 || industryWeight > 45 ? "warn" : "safe"
      };
    }
