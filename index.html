<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1118" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="иӮЎзҘЁAgent" />
  <title>иӮЎзҘЁеҲҶжһҗ Agent жүӢжңәзүҲ</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1118;
      --panel: #121922;
      --panel-2: #151f2c;
      --panel-3: #0f1721;
      --line: #263242;
      --muted: #8ea0b5;
      --text: #eaf2ff;
      --green: #28d76f;
      --red: #ff4d63;
      --blue: #43a5ff;
      --yellow: #ffbd3e;
      --violet: #8b7bff;
      --shadow: 0 16px 44px rgba(0, 0, 0, .32);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 0%, rgba(67, 165, 255, .11), transparent 28%),
        linear-gradient(135deg, #081018 0%, #0d121a 48%, #101820 100%);
      color: var(--text);
      min-height: 100vh;
    }

    body.locked .app {
      display: none;
    }

    body.locked .mobile-dock {
      display: none;
    }

    .access-gate {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(67, 165, 255, .16), transparent 30%),
        #0b1118;
    }

    body.locked .access-gate {
      display: flex;
    }

    .gate-card {
      width: min(420px, 100%);
      border: 1px solid #263242;
      border-radius: 8px;
      background: #121922;
      box-shadow: 0 16px 44px rgba(0, 0, 0, .32);
      padding: 18px;
    }

    .gate-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .gate-card p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 14px;
      font-size: 13px;
    }

    .gate-error {
      min-height: 20px;
      color: var(--red);
      font-size: 13px;
      margin-top: 8px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app {
      width: min(1840px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(580px, 1.65fr);
      gap: 16px;
      align-items: stretch;
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .88);
      box-shadow: var(--shadow);
      border-radius: 8px;
      padding: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, #14345a, #112236);
      color: #62b6ff;
      border: 1px solid #24435f;
      font-weight: 900;
      font-size: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2vw, 30px);
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 120px 180px 160px;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    input, textarea, select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b121b;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #3f8fd4;
      box-shadow: 0 0 0 3px rgba(67, 165, 255, .14);
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #182536;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: #1f9c55;
      background: linear-gradient(180deg, #18a756, #0f7e42);
    }

    .btn.ghost {
      background: #0d141d;
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .76);
      color: var(--muted);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
    }

    .tab.active {
      background: #122334;
      border-color: #2b83c6;
      color: #d8ecff;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 78px;
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .82);
      border-radius: 8px;
      padding: 14px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 9px;
      font-size: clamp(20px, 2vw, 27px);
      line-height: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(560px, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: rgba(18, 25, 34, .9);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .22);
    }

    .panel-head {
      padding: 14px;
      border-bottom: 1px solid #202b39;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .panel-body {
      padding: 14px;
    }

    .watchlist {
      display: grid;
      gap: 8px;
    }

    .watch-btn {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      text-align: left;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #202b39;
      background: #0f1721;
      color: var(--text);
      cursor: pointer;
    }

    .watch-remove {
      width: 28px;
      height: 28px;
      border: 1px solid #314054;
      border-radius: 6px;
      background: #141e2a;
      color: #ff8794;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      align-self: start;
    }

    .watch-btn.active {
      border-color: #2f90d6;
      background: #132235;
    }

    .code {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .price-up { color: var(--red); }
    .price-down { color: var(--green); }

    .agent-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(20, 28, 39, .96), rgba(13, 19, 28, .96));
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .stock-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid #202b39;
    }

    .stock-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .big-price {
      font-size: 34px;
      font-weight: 900;
      text-align: right;
      line-height: 1;
    }

    .change {
      margin-top: 8px;
      text-align: right;
      font-weight: 800;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 20px 4px;
    }

    .badge {
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 900;
      background: #16202d;
      color: #b7c9dd;
    }

    .badge.buy { color: #80ffb1; background: rgba(40, 215, 111, .12); }
    .badge.sell { color: #ff8794; background: rgba(255, 77, 99, .13); }
    .badge.wait { color: #ffd583; background: rgba(255, 189, 62, .13); }
    .badge.info { color: #80c6ff; background: rgba(67, 165, 255, .14); }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px 20px;
    }

    .kv {
      display: grid;
      gap: 9px;
    }

    .kv div {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .kv b {
      color: var(--text);
      font-size: 15px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 20px 16px;
    }

    .score-box {
      background: #0d1620;
      border: 1px solid #192635;
      border-radius: 6px;
      padding: 12px;
    }

    .score-box span {
      color: var(--muted);
      font-size: 12px;
    }

    .score-box strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
    }

    .bars {
      display: grid;
      gap: 10px;
      padding: 0 20px 18px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 90px 1fr 42px;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .track {
      height: 8px;
      border-radius: 999px;
      background: #222c38;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      width: 50%;
      background: var(--blue);
    }

    .fill.red { background: var(--red); }
    .fill.green { background: var(--green); }
    .fill.yellow { background: var(--yellow); }

    .explain, .strategy {
      margin: 0 20px 18px;
      border-radius: 8px;
      border: 1px solid #273448;
      background: #0d141d;
      padding: 14px;
    }

    .fundamental {
      margin: 0 20px 18px;
      border-radius: 8px;
      border: 1px solid #2a3a4d;
      background: linear-gradient(180deg, rgba(67, 165, 255, .09), rgba(13, 20, 29, .98));
      padding: 14px;
    }

    .fundamental-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 10px 0 12px;
    }

    .fund-item {
      min-height: 70px;
      border: 1px solid #1d2a3a;
      border-radius: 6px;
      background: rgba(10, 17, 24, .7);
      padding: 10px;
    }

    .fund-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .fund-item b {
      display: block;
      margin-top: 7px;
      font-size: 18px;
    }

    .risk-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 10px;
    }

    .risk-tag {
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 900;
      color: #bee0ff;
      background: rgba(67, 165, 255, .12);
    }

    .risk-tag.safe { color: #80ffb1; background: rgba(40, 215, 111, .12); }
    .risk-tag.warn { color: #ffd583; background: rgba(255, 189, 62, .14); }
    .risk-tag.danger { color: #ff8794; background: rgba(255, 77, 99, .14); }

    .horizon-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .horizon {
      border: 1px solid #1d2a3a;
      border-radius: 6px;
      background: rgba(10, 17, 24, .7);
      padding: 10px;
      line-height: 1.5;
    }

    .horizon b {
      display: block;
      margin-bottom: 5px;
    }

    .target-box {
      margin-top: 12px;
      border: 1px solid #25435d;
      border-radius: 8px;
      background: rgba(67, 165, 255, .08);
      padding: 12px;
    }

    .target-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 10px 0;
    }

    .target-inputs label {
      font-size: 12px;
    }

    .target-inputs input {
      min-height: 38px;
    }

    .target-result {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .target-result .fund-item {
      min-height: 62px;
    }

    .tool-panel {
      margin: 0 20px 18px;
      border: 1px solid #273448;
      border-radius: 8px;
      background: #0d141d;
      padding: 14px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .mini-card {
      border: 1px solid #1d2a3a;
      border-radius: 6px;
      background: rgba(10, 17, 24, .7);
      padding: 10px;
      line-height: 1.5;
    }

    .mini-card b {
      display: block;
      margin-bottom: 5px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }

    .switch-row input[type="checkbox"] {
      width: 42px;
      min-height: 22px;
    }

    .alert-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .alert-item {
      border-left: 3px solid #43a5ff;
      background: rgba(67, 165, 255, .08);
      padding: 8px 10px;
      border-radius: 5px;
      line-height: 1.45;
      font-size: 13px;
    }

    .alert-item.warn { border-left-color: var(--yellow); background: rgba(255, 189, 62, .1); }
    .alert-item.danger { border-left-color: var(--red); background: rgba(255, 77, 99, .1); }

    .strategy {
      border-color: #1fa45a;
      background: linear-gradient(180deg, rgba(31, 164, 90, .12), rgba(16, 21, 31, .98));
    }

    .strategy.warn {
      border-color: #d4a126;
      background: linear-gradient(180deg, rgba(255, 189, 62, .14), rgba(16, 21, 31, .98));
    }

    .strategy.risk {
      border-color: #d64255;
      background: linear-gradient(180deg, rgba(255, 77, 99, .13), rgba(16, 21, 31, .98));
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      margin-bottom: 10px;
      color: #dff0ff;
    }

    ol {
      margin: 0;
      padding-left: 22px;
    }

    li {
      padding: 7px 0;
      border-bottom: 1px solid #1e2a38;
      line-height: 1.55;
    }

    li:last-child {
      border-bottom: 0;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .action {
      background: rgba(10, 17, 24, .72);
      border: 1px solid #1d2a3a;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      min-height: 86px;
    }

    .action b {
      display: block;
      margin-bottom: 6px;
    }

    .action small {
      color: var(--muted);
      line-height: 1.4;
    }

    .candidates {
      max-height: 604px;
      overflow: auto;
      padding-right: 4px;
    }

    .candidate {
      border-bottom: 1px solid #202b39;
      padding: 12px 10px;
    }

    .candidate:last-child { border-bottom: 0; }

    .candidate-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
    }

    .candidate p {
      margin: 7px 0 0;
      color: #bfd0e3;
      font-size: 13px;
      line-height: 1.5;
    }

    .score-pill {
      color: #55b7ff;
      font-weight: 900;
    }

    textarea {
      resize: vertical;
      min-height: 104px;
      line-height: 1.5;
    }

    .chat-log {
      display: grid;
      gap: 10px;
    }

    .chat-bubble {
      background: #0d141d;
      border: 1px solid #202d3d;
      border-radius: 8px;
      padding: 12px;
      line-height: 1.55;
      color: #d8e8fa;
    }

    .chat-bubble strong {
      color: #76c4ff;
    }

    .disclaimer {
      margin-top: 14px;
      color: #75879b;
      font-size: 12px;
      line-height: 1.5;
    }

    .quick-board,
    .mobile-dock {
      display: none;
    }

    .watch-quote {
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      justify-content: end;
      gap: 4px 8px;
      min-width: 92px;
      text-align: right;
    }

    .watch-price {
      font-size: 16px;
      font-weight: 900;
    }

    .watch-change {
      font-size: 13px;
      font-weight: 900;
    }

    .watch-signal {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11px;
    }

    @media (max-width: 1260px) {
      .topbar, .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr 120px 1fr 140px;
      }

      .metrics {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100vw - 16px, 680px);
        padding-top: 8px;
      }

      .topbar, .controls, .metrics, .grid2, .score-grid, .action-grid {
        grid-template-columns: 1fr;
      }

      .fundamental-grid, .horizon-grid {
        grid-template-columns: 1fr;
      }

      .mode-tabs {
        grid-template-columns: 1fr;
      }

      .stock-head {
        grid-template-columns: 1fr;
      }

      .big-price, .change {
        text-align: left;
      }

      .bar-row {
        grid-template-columns: 74px 1fr 34px;
      }
    }

    /* Mobile-first polish for WeChat browser sharing. */
    @media (max-width: 640px) {
      body {
        background: #0b1118;
        -webkit-text-size-adjust: 100%;
        overflow-x: hidden;
      }

      .app {
        width: 100%;
        max-width: 480px;
        padding: max(10px, env(safe-area-inset-top)) 10px calc(84px + env(safe-area-inset-bottom));
        overflow-x: hidden;
      }

      .topbar {
        display: block;
        border-radius: 0 0 8px 8px;
        padding: 12px;
        margin: -10px -10px 10px;
        border-left: 0;
        border-right: 0;
      }

      .brand {
        gap: 10px;
      }

      .logo {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }

      h1 {
        font-size: 22px;
      }

      .sub {
        display: none;
      }

      .controls {
        grid-template-columns: minmax(0, 1fr) 72px 72px;
        gap: 8px;
        margin-top: 10px;
      }

      .controls label:first-child {
        grid-column: auto;
      }

      .controls label:nth-child(2),
      #pullBtn {
        display: none;
      }

      .controls .btn {
        min-height: 42px;
        padding: 0 8px;
        font-size: 13px;
      }

      input, textarea {
        min-height: 42px;
        font-size: 16px;
      }

      .mode-tabs {
        position: sticky;
        top: 0;
        z-index: 5;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin: 0 -10px 10px;
        padding: 8px 10px;
        background: rgba(11, 17, 24, .95);
        border-bottom: 1px solid #202b39;
      }

      .tab {
        min-height: 44px;
        padding: 7px 4px;
        gap: 4px;
        font-size: 13px;
      }

      .tab svg {
        width: 15px;
        height: 15px;
      }

      .metrics {
        display: flex;
        overflow-x: auto;
        gap: 8px;
        margin: 0 -10px 10px;
        padding: 0 10px 2px;
        scrollbar-width: none;
        overscroll-behavior-x: contain;
      }

      .metrics::-webkit-scrollbar { display: none; }

      .metric {
        flex: 0 0 112px;
        min-height: 56px;
        padding: 9px 10px;
      }

      .metric strong {
        margin-top: 6px;
        font-size: 18px;
      }

      .layout {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .panel {
        border-radius: 8px;
        max-width: 100%;
      }

      .panel-head {
        padding: 12px;
      }

      .panel-body {
        padding: 12px;
      }

      .watchlist {
        display: grid;
        gap: 6px;
      }

      .layout > .panel:first-child .panel-head {
        position: sticky;
        top: 61px;
        z-index: 3;
        background: #121922;
      }

      .watch-btn {
        width: 100%;
        min-height: 62px;
        padding: 9px 10px;
        align-items: center;
      }

      .watch-remove {
        grid-row: 1 / span 2;
        grid-column: 3;
        width: 30px;
        height: 30px;
        align-self: center;
      }

      .watch-quote {
        grid-template-columns: auto auto auto;
        min-width: 154px;
      }

      .watch-signal {

    function seededRandom(seed) {
      let h = 2166136261;
      for (let i = 0; i < seed.length; i++) {
        h ^= seed.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return () => {
        h += h << 13; h ^= h >>> 7;
        h += h << 3; h ^= h >>> 17;
        h += h << 5;
        return ((h >>> 0) % 10000) / 10000;
      };
    }

    function defaultCodes() {

    function normalizeCodes(value) {
      return [...new Set(String(value || "")
        .split(/[,\sпјҢгҖҒ]+/)
        .map(s => s.trim())
        .filter(Boolean)
        .map(s => s.replace(/\D/g, ""))
        .filter(s => /^\d{6}$/.test(s)))];
    }

    function makeStock(code, index) {
      const rand = seededRandom(`${code}-${state.mode}-${Date.now().toString().slice(0, 8)}`);
      const base = 10 + rand() * 78 + index * 2.3;
      const chg = state.mode === "auction"
        ? (rand() * 10.8 - 1.4)
        : state.mode === "intraday"
          ? (rand() * 14 - 5.2)
          : (rand() * 12 - 4.8);
      const up = chg >= 0;
      const auctionBoost = state.mode === "auction" ? 8 : 0;
      const net = Math.round((rand() * 520000 - 120000) * (up ? 1 : -0.4));
      const superOrder = Math.round(Math.abs(net) * (0.58 + rand()));
      const score = Math.max(18, Math.min(99, Math.round(48 + chg * 4 + rand() * 24 + auctionBoost)));
      const momentum = Math.max(5, Math.min(100, Math.round(score + rand() * 20 - 10)));
      const liquidity = Math.max(10, Math.min(100, Math.round(44 + rand() * 56)));
      const risk = Math.max(1, Math.min(100, Math.round(100 - score + rand() * 18)));
      const price = +(base * (1 + chg / 100)).toFixed(2);
      const support1 = +(price * (1 - (0.018 + rand() * 0.028))).toFixed(2);
      const support2 = +(price * (1 - (0.052 + rand() * 0.035))).toFixed(2);
      const pressure1 = +(price * (1 + (0.015 + rand() * 0.035))).toFixed(2);
      const pressure2 = +(price * (1 + (0.052 + rand() * 0.05))).toFixed(2);
      const confidence = Math.max(25, Math.min(98, Math.round(score * .72 + liquidity * .22 + rand() * 16)));
      const trend = score >= 78 ? "ејәеҠҝеҗёзӯ№" : score >= 62 ? "еӣһиё©дҪҺеҗё" : score >= 48 ? "и§ӮжңӣзӯүдҝЎеҸ·" : "йЈҺйҷ©еҮәиҙ§";
      return {
        code,
        name: stockNames[code] || `иҮӘйҖүиӮЎ${code.slice(-3)}`,
        price,
        chg: +chg.toFixed(2),
        amount: +(18 + rand() * 92).toFixed(2),
        support1,
        support2,
        pressure1,
        pressure2,
        stop: +(support2 * .985).toFixed(2),
        score,
        momentum,
        liquidity,

        pe: +(35 + rand() * 130).toFixed(2),
        peTtm: +(30 + rand() * 120).toFixed(2),
        pb: +(1.2 + rand() * 8).toFixed(2),
        totalMarketCap: Math.round((80 + rand() * 720) * 100000000),
        floatMarketCap: Math.round((70 + rand() * 650) * 100000000),
        stRiskLevel: "дҪҺ",
        stRiskReasons: ["еҗҚз§°жңӘи§ҰеҸ‘ST/йҖҖеёӮж Үзӯҫ", "д»·ж јдёҺжҲҗдәӨж•°жҚ®жӯЈеёё"]
      };
    }

    function marketPrefix(code) {

    function eastmoneyJsonp(url, timeout = 8000) {
      return new Promise((resolve, reject) => {
        const callback = `em_cb_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const script = document.createElement("script");
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("дёңиҙўжҺҘеҸЈе“Қеә”и¶…ж—¶"));
        }, timeout);

        function cleanup() {
          clearTimeout(timer);
          delete window[callback];
          script.remove();
        }

        window[callback] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("дёңиҙўжҺҘеҸЈеҠ иҪҪеӨұиҙҘ"));
        };

        const separator = url.includes("?") ? "&" : "?";
        script.src = `${url}${separator}cb=${callback}&_=${Date.now()}`;
        document.body.appendChild(script);
      });
    }

    function asNumber(value, fallback = 0) {
      const n = Number(value);

    function quoteToStock(row, index) {
      const code = row.f12;
      const price = asNumber(row.f2);
      const chg = asNumber(row.f3);
      const open = asNumber(row.f17, price);
      const prevClose = asNumber(row.f18, price);
      const high = asNumber(row.f15, price);
      const low = asNumber(row.f16, price);
      const amount = +(asNumber(row.f6) / 100000000).toFixed(2);
      const turnover = asNumber(row.f8);
      const net = Math.round(asNumber(row.f62) / 10000);
      const superOrder = Math.round(asNumber(row.f66) / 10000);
      const industry = row.f100 || "жңӘзҹҘиЎҢдёҡ";
      const totalMarketCap = asNumber(row.f20);
      const floatMarketCap = asNumber(row.f21);
      const pe = asNumber(row.f9);
      const peTtm = asNumber(row.f115, pe);
      const pb = asNumber(row.f23);
      const openPct = prevClose ? ((open - prevClose) / prevClose) * 100 : 0;
      const intradayPos = high > low ? ((price - low) / (high - low)) * 100 : 50;
      const closePos = intradayPos;
      const openHold = open ? ((price - open) / open) * 100 : 0;
      const moneyPower = Math.max(-20, Math.min(20, net / 3000));
      const auctionBoost = state.mode === "auction" ? Math.max(-10, Math.min(16, openPct * 3)) : 0;
      const closeBoost = state.mode === "close" ? Math.max(-8, Math.min(12, intradayPos / 9 - 4)) : 0;
      const score = Math.max(12, Math.min(99, Math.round(52 + chg * 3.1 + moneyPower + turnover * .45 + auctionBoost + closeBoost)));
      const momentum = Math.max(5, Math.min(100, Math.round(48 + chg * 4 + intradayPos * .32 + turnover * .35)));
      const liquidity = Math.max(10, Math.min(100, Math.round(35 + Math.log10(Math.max(1, amount)) * 22 + turnover * .7)));
      const risk = Math.max(1, Math.min(100, Math.round(100 - score + Math.max(0, -chg) * 6 + (net < 0 ? 12 : 0))));
      const digits = priceDigits(price);
      const support1 = +(Math.max(low, price * 0.97)).toFixed(digits);
      const support2 = +(Math.max(0.01, Math.min(low, price * 0.94))).toFixed(digits);
      const pressure1 = +(Math.max(high, price * 1.025)).toFixed(digits);
      const pressure2 = +(Math.max(pressure1, price * 1.06)).toFixed(digits);
      const confidence = Math.max(22, Math.min(98, Math.round(score * .68 + liquidity * .18 + (net > 0 ? 10 : 0))));

      return {
        code,
        name: row.f14 || stockNames[code] || `иҮӘйҖүиӮЎ${code.slice(-3)}`,
        price,
        chg: +chg.toFixed(2),
        amount,
        support1,
        support2,
        pressure1,
        pressure2,
        stop: +(support2 * .985).toFixed(digits),
        score,
        momentum,
        liquidity,
        risk,
        confidence,
        net,
        superOrder,
        trend: score >= 78 ? "ејәеҠҝеҗёзӯ№" : score >= 62 ? "еӣһиё©дҪҺеҗё" : score >= 48 ? "и§ӮжңӣзӯүдҝЎеҸ·" : "йЈҺйҷ©еҮәиҙ§",
        board: code.startsWith("3") ? "еҲӣдёҡжқҝ" : code.startsWith("688") ? "з§‘еҲӣжқҝ" : "дё»жқҝ",
        concentration: score > 78 ? "й«ҳеәҰйӣҶдёӯ" : score > 55 ? "дёӯзӯүйӣҶдёӯ" : "дёҖиҲ¬еҲҶж•Ј",
        open,
        openPct: +openPct.toFixed(2),
        openHold: +openHold.toFixed(2),
        high,
        low,
        closePos: Math.round(closePos),
        prevClose,
        turnover,
        industry,
        totalMarketCap,
        floatMarketCap,
        pe,
        peTtm,
        pb,
        source: "дёңж–№иҙўеҜҢ"
      };
    }

    function modeScore(stock) {
      const money = Math.max(-20, Math.min(20, stock.net / 3000));
      if (state.mode === "auction") {
        return Math.max(12, Math.min(99, Math.round(
          48 + (stock.openPct || 0) * 7 + (stock.openHold || 0) * 4 + money + (stock.turnover || 0) * .35
        )));
      }
      if (state.mode === "intraday") {
        return Math.max(12, Math.min(99, Math.round(
          45 + stock.chg * 3.2 + (stock.closePos || 50) * .24 + money + (stock.turnover || 0) * .45
        )));
      }
      return Math.max(12, Math.min(99, Math.round(
        42 + stock.chg * 2.2 + (stock.closePos || 50) * .42 + money * .8 + (stock.turnover || 0) * .25
      )));
    }

    function withModeScores(stocks) {
      return stocks.map(stock => {
        const score = modeScore(stock);
        const risk = Math.max(1, Math.min(100, Math.round(100 - score + Math.max(0, -stock.chg) * 5 + (stock.net < 0 ? 10 : 0))));
        const momentum = state.mode === "auction"
          ? Math.max(5, Math.min(100, Math.round(50 + (stock.openPct || 0) * 8 + (stock.openHold || 0) * 5 + (stock.net > 0 ? 12 : -8))))
          : Math.max(5, Math.min(100, Math.round(45 + stock.chg * 4 + (stock.closePos || 50) * .3 + (stock.turnover || 0) * .35)));
        const confidence = Math.max(22, Math.min(98, Math.round(score * .7 + stock.liquidity * .16 + (stock.net > 0 ? 9 : 0))));
        return {
          ...stock,
          score,
          risk,
          momentum,
          confidence,
          concentration: score > 78 ? "й«ҳеәҰйӣҶдёӯ" : score > 55 ? "дёӯзӯүйӣҶдёӯ" : "дёҖиҲ¬еҲҶж•Ј",
          trend: score >= 78 ? "ејәеҠҝеҗёзӯ№" : score >= 62 ? "еӣһиё©дҪҺеҗё" : score >= 48 ? "и§ӮжңӣзӯүдҝЎеҸ·" : "йЈҺйҷ©еҮәиҙ§",
          ...fundamentalRisk(stock, score)
        };
      });
    }

    function fundamentalRisk(stock, score = stock.score) {
      const name = stock.name || "";
      const reasons = [];
      let levelScore = 0;

      if (/йҖҖеёӮ/.test(name)) {
        levelScore += 100;
        reasons.push("еҗҚз§°еҗ«йҖҖеёӮж Үзӯҫ");
      }
      if (/(^|[^A-Z])\*?ST/i.test(name)) {
        levelScore += 80;
        reasons.push("еҗҚз§°еҗ«STжҲ–*STж Үзӯҫ");
      }
      if (!stock.price || stock.price <= 0 || !stock.amount) {
        levelScore += 55;
        reasons.push("д»·ж јжҲ–жҲҗдәӨйўқејӮеёёпјҢеҸҜиғҪеҒңзүҢ/йҖҖеёӮж•ҙзҗҶ/ж— жңүж•ҲиЎҢжғ…");
      }
      if (stock.totalMarketCap > 0 && stock.totalMarketCap < 3000000000) {
        levelScore += 18;
        reasons.push("жҖ»еёӮеҖјеҒҸе°ҸпјҢжіўеҠЁе’ҢеЈійЈҺйҷ©жӣҙй«ҳ");
      }
      if (stock.peTtm < 0 || stock.pe < 0) {
        levelScore += 24;
        reasons.push("еёӮзӣҲзҺҮдёәиҙҹпјҢзӣҲеҲ©иҙЁйҮҸйңҖиҰҒж ёжҹҘ");
      }
      if (stock.peTtm > 120 || stock.pe > 150) {
        levelScore += 14;
        reasons.push("дј°еҖјеҒҸй«ҳпјҢйңҖзЎ®и®Өдёҡз»©е…‘зҺ°");
      }
      if (stock.pb > 12) {
        levelScore += 10;
        reasons.push("PBеҒҸй«ҳпјҢжіЁж„Ҹдј°еҖјеӣһиҗҪйЈҺйҷ©");
      }

      if (!reasons.length) reasons.push("жңӘеҸ‘зҺ°жҳҺжҳҫST/йҖҖеёӮеҗҚз§°йЈҺйҷ©");
      if (levelScore < 80) {
        reasons.push("иҙЁжҠјгҖҒи§ЈзҰҒгҖҒе•ҶиӘүгҖҒзӣ‘з®Ўй—®иҜўйңҖз»“еҗҲе…¬е‘Ҡз»§з»ӯж ёжҹҘ");
      }
      const level = levelScore >= 80 ? "й«ҳ" : levelScore >= 35 ? "дёӯ" : "дҪҺ";
      const health = Math.max(5, Math.min(99, Math.round(86 - levelScore * .55 + Math.min(10, score / 10))));
      return {
        stRiskLevel: level,
        stRiskReasons: reasons,
        fundamentalHealth: health
      };
    }

    function fmtCap(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return "--";
      if (n >= 1000000000000) return `${(n / 1000000000000).toFixed(2)}дёҮдәҝ`;
      return `${(n / 100000000).toFixed(2)}дәҝ`;
    }

    function fmtRatio(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n === 0) return "--";
      return n.toFixed(2);
    }

    function targetKey(code) {
      return `stockAgentTarget:${code}`;
    }

    function readTargetConfig(code) {
      try {
        return JSON.parse(localStorage.getItem(targetKey(code)) || "{}");
      } catch {
        return {};
      }
    }

    function saveTargetConfig(code, config) {
      localStorage.setItem(targetKey(code), JSON.stringify(config));
    }

    function inferredProfitYi(stock) {
      if (stock.totalMarketCap > 0 && stock.peTtm > 0) {
        return stock.totalMarketCap / stock.peTtm / 100000000;
      }
      if (stock.totalMarketCap > 0 && stock.pe > 0) {
        return stock.totalMarketCap / stock.pe / 100000000;
      }
      return 0;
    }

    function defaultTargetPe(stock) {
      const base = stock.peTtm > 0 ? stock.peTtm : stock.pe;
      if (base > 0) return Math.max(12, Math.min(80, +(base * 0.85).toFixed(1)));
      if (/еҚҠеҜјдҪ“|иҠҜзүҮ|дәәе·ҘжҷәиғҪ|з®—еҠӣ|жңәеҷЁдәә/.test(stock.industry || "")) return 45;
      return 25;
    }

    function targetValuation(stock) {
      const saved = readTargetConfig(stock.code);
      const inferred = inferredProfitYi(stock);
      const forecastProfit = Number.isFinite(Number(saved.profit)) && Number(saved.profit) > 0
        ? Number(saved.profit)
        : +(inferred * 1.15).toFixed(2);
      const targetPe = Number.isFinite(Number(saved.pe)) && Number(saved.pe) > 0
        ? Number(saved.pe)
        : defaultTargetPe(stock);
      const totalShares = stock.price > 0 && stock.totalMarketCap > 0
        ? stock.totalMarketCap / stock.price
        : 0;
      const targetMarketCap = forecastProfit * targetPe * 100000000;
      const targetPrice = totalShares > 0 ? targetMarketCap / totalShares : 0;
      const upside = stock.price > 0 && targetPrice > 0 ? ((targetPrice / stock.price - 1) * 100) : 0;
      const conservative = targetPrice * 0.85;
      const optimistic = targetPrice * 1.18;
      return {
        saved,
        inferred,
        forecastProfit,
        targetPe,
        targetMarketCap,
        targetPrice,
        upside,
        conservative,
        optimistic
      };
    }

            <li>дҝқе®Ҳзӣ®ж Үд»·зәҰ${target.conservative ? target.conservative.toFixed(2) : "--"}пјҢдёӯжҖ§зӣ®ж Үд»·зәҰ${target.targetPrice ? target.targetPrice.toFixed(2) : "--"}пјҢд№җи§Ӯзӣ®ж Үд»·зәҰ${target.optimistic ? target.optimistic.toFixed(2) : "--"}гҖӮ</li>

        : "";
      return `

          <div class="switch-row">

            <div class="mini-card"><b>и§ҰеҸ‘жқЎд»¶</b><span>${trigger.condition}пјӣзӣ®ж Үе…ҲзңӢ ${trigger.takeProfit}гҖӮ</span></div>
          </div>
          <div class="target-inputs">
            <label>
              жҢҒд»“жҲҗжң¬
              <input class="holding-cost-input" data-code="${stock.code}" value="${holding.holding.cost ?? ""}" placeholder="${stock.price}" inputmode="decimal" />
            </label>

            <div class="fund-item"><span>и®ЎеҲ’йЈҺйҷ©</span><b>${holding.shares ? `${Math.round(holding.maxRisk)}е…ғ` : "--"}</b></div>

          ${history.length ? `
            <div class="mini-card" style="margin-top:10px;">
              <b>еӨҚзӣҳиҜ„еҲҶ</b>

              ${history.map(item => {

                  ${item.time} В· ${item.name} В· ${item.mode} В· ${item.action}<br />
                  и®°еҪ•${item.price}е…ғпјҢеҺӢеҠӣ${item.pressure}пјҢжӯўжҚҹ${item.stop} В· ${scored.label}пјҡ${scored.detail}
                </div>`;
              }).join("")}

      `;
    }

    function riskTagClass(level) {
      if (level === "й«ҳ") return "danger";
      if (level === "дёӯ") return "warn";
      return "safe";
    }

    function mediumLongView(stock) {
      const stBad = stock.stRiskLevel === "й«ҳ";
      const valuationHigh = stock.peTtm > 120 || stock.pb > 12;
      const valuationOk = stock.peTtm > 0 && stock.peTtm < 80 && stock.pb > 0 && stock.pb < 8;
      const mid = stBad
        ? "дёӯжңҹе…ҲжҺ’йҷӨпјҡеӯҳеңЁжҳҺжҳҫST/йҖҖеёӮжҲ–ж— жңүж•ҲиЎҢжғ…йЈҺйҷ©пјҢзҹӯзәҝд№ҹеҸӘйҖӮеҗҲи§ӮжңӣгҖӮ"
        : stock.score >= 70 && stock.net >= 0
          ? "дёӯжңҹеҒҸејәпјҡиө„йҮ‘е’Ңд»·ж јз»“жһ„иҝҳеңЁпјҢеӣһиё©дёҚз ҙе…ій”®ж”Ҝж’‘еҸҜз»§з»ӯи·ҹиёӘгҖӮ"
          : stock.net < 0
            ? "дёӯжңҹи°Ёж…Һпјҡдё»еҠӣеҮҖжөҒеҮәпјҢе…Ҳзӯүиө„йҮ‘йҮҚж–°иҪ¬жӯЈгҖӮ"
            : "дёӯжңҹдёӯжҖ§пјҡйўҳжқҗе’ҢжөҒеҠЁжҖ§еҸҜзңӢпјҢдҪҶйңҖиҰҒзӯүи¶ӢеҠҝзЎ®и®ӨгҖӮ";
      const long = stBad
        ? "й•ҝжңҹдёҚе»әи®®зәіе…Ҙжұ пјҡе…ҲзӯүйЈҺйҷ©ж Үзӯҫи§ЈйҷӨгҖҒиҙўжҠҘе’Ңе…¬е‘ҠзЎ®и®ӨгҖӮ"
        : valuationHigh
          ? "й•ҝжңҹи°Ёж…Һпјҡдј°еҖјеҒҸй«ҳпјҢйҷӨйқһдёҡз»©й«ҳйҖҹе…‘зҺ°пјҢеҗҰеҲҷжҖ§д»·жҜ”дёҖиҲ¬гҖӮ"
          : valuationOk && stock.fundamentalHealth >= 70
            ? "й•ҝжңҹеҸҜи§ӮеҜҹпјҡдј°еҖје’Ңеҹәжң¬йқўйЈҺйҷ©жҡӮеҸҜжҺҘеҸ—пјҢйҖӮеҗҲж”ҫе…Ҙи§ӮеҜҹжұ гҖӮ"
            : "й•ҝжңҹи§ӮеҜҹпјҡйңҖиҰҒиЎҘе……иҙўжҠҘеўһйҖҹгҖҒеҲ©ж¶ҰиҙЁйҮҸе’ҢиЎҢдёҡжҷҜж°”еәҰеҗҺеҶҚе®ҡгҖӮ";
      return { mid, long };
    }

    function renderFundamentalPanel(stock) {
      const views = mediumLongView(stock);
      const riskClass = riskTagClass(stock.stRiskLevel);
      const tags = [
        `<span class="risk-tag ${riskClass}">STйЈҺйҷ©пјҡ${stock.stRiskLevel}</span>`,
        `<span class="risk-tag ${stock.fundamentalHealth >= 70 ? "safe" : stock.fundamentalHealth >= 45 ? "warn" : "danger"}">еҹәжң¬йқўеҒҘеә·еәҰпјҡ${stock.fundamentalHealth}еҲҶ</span>`,
        `<span class="risk-tag">иЎҢдёҡпјҡ${stock.industry || "--"}</span>`
      ].join("");
      return `
        <div class="fundamental">
          <div class="section-title"><i data-lucide="shield-alert"></i>еҹәжң¬йқўдёҺSTйЈҺйҷ©йӣ·иҫҫ</div>
          <div class="risk-tags">${tags}</div>
          <div class="fundamental-grid">
            <div class="fund-item"><span>жҖ»еёӮеҖј</span><b>${fmtCap(stock.totalMarketCap)}</b></div>
            <div class="fund-item"><span>жөҒйҖҡеёӮеҖј</span><b>${fmtCap(stock.floatMarketCap)}</b></div>
            <div class="fund-item"><span>PE / TTM</span><b>${fmtRatio(stock.pe)} / ${fmtRatio(stock.peTtm)}</b></div>
            <div class="fund-item"><span>PB</span><b>${fmtRatio(stock.pb)}</b></div>
          </div>
          <ol>${stock.stRiskReasons.map(reason => `<li>${reason}</li>`).join("")}</ol>
          ${renderTargetPanel(stock)}
          <div class="horizon-grid" style="margin-top:12px;">
            <div class="horizon"><b>дёӯжңҹеҲӨж–ӯ</b><span>${views.mid}</span></div>
            <div class="horizon"><b>й•ҝжңҹеҲӨж–ӯ</b><span>${views.long}</span></div>
          </div>
        </div>
      `;
    }

    async function fetchEastmoneyStocks(codes) {
      const secids = codes.map(code => `${marketPrefix(code)}.${code}`).join(",");
      const fields = [
        "f2", "f3", "f4", "f5", "f6", "f8", "f9", "f10", "f12", "f14",
        "f15", "f16", "f17", "f18", "f20", "f21", "f23", "f62", "f66", "f69", "f72", "f75",
        "f78", "f81", "f84", "f87", "f100", "f102", "f115", "f184"
      ].join(",");
      const url = `https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=${encodeURIComponent(secids)}&fields=${fields}`;
      const data = await eastmoneyJsonp(url);
      const rows = data?.data?.diff || [];
      if (!rows.length) throw new Error("дёңиҙўжІЎжңүиҝ”еӣһиЎҢжғ…ж•°жҚ®");
      return rows.map(quoteToStock);
    }

    function modeAdjustedAdvice(stock) {
      const positive = stock.score >= 72 && stock.net > 0;
      const weak = stock.score < 50 || stock.net < -30000;
      if (state.mode === "auction") {
        if (positive) return ["ејәзғҲе…іжіЁ", "з«һд»·ејәжүҝжҺҘ", "ејҖзӣҳдёҚз ҙз«һд»·еқҮзәҝеҶҚи·ҹйҡҸ"];
        if (weak) return ["и°Ёж…ҺиҝҮж»Ө", "з«һд»·иө„йҮ‘еҒҸејұ", "ејҖзӣҳеҶІй«ҳе…ҲзңӢе…‘зҺ°"];
        return ["дҪҺеҗёеҖҷйҖү", "з«һд»·дҝЎеҸ·дёҖиҲ¬", "зӯүеӣһиё©ж”Ҝж’‘дҪҚзЎ®и®Ө"];
      }
      if (state.mode === "intraday") {
        if (positive) return ["еҗёзӯ№", "йҮҸиғҪе»¶з»ӯ", "еӣһиё©дёҚз ҙеҸҜеҲҶжү№и§ӮеҜҹ"];
        if (weak) return ["еҮәиҙ§", "еӨ§еҚ•жөҒеҮә", "е…ҲйҷҚд»“дҪҚзӯүйЈҺйҷ©йҮҠж”ҫ"];
        return ["зӯүеҫ…", "йңҮиҚЎж•ҙзҗҶ", "зӘҒз ҙеҺӢеҠӣдҪҚеҶҚзңӢ"];
      }
      if (positive) return ["йҡ”еӨңеҖҷйҖү", "е°ҫзӣҳжҠўзӯ№", "д»“дҪҚжҺ§еҲ¶еҗҺеҸҜз•ҷи§ӮеҜҹ"];
      if (weak) return ["дёҚйҡ”еӨң", "е°ҫзӣҳиө°ејұ", "ж¬Ўж—Ҙе…ҲзңӢдҝ®еӨҚеҠӣеәҰ"];
      return ["и§ӮеҜҹ", "ж”¶зӣҳдёӯжҖ§", "жҳҺж—ҘзЎ®и®Өж–№еҗ‘"];
    }

    async function generate() {
      if (state.refreshing) return;
      const codes = [...new Set([...(state.codes.length ? state.codes : defaultCodes()), ...state.queryCodes])];
      state.refreshing = true;
      state.refreshIn = 30;
      state.dataSource = "жӯЈеңЁжӢүеҸ–дёңж–№иҙўеҜҢиЎҢжғ…...";
      render();
      try {
        const eastmoneyStocks = await fetchEastmoneyStocks(codes);
        state.stocks = withModeScores(eastmoneyStocks).sort((a, b) => b.score - a.score);
        state.dataSource = `дёңж–№иҙўеҜҢе®һж—¶иЎҢжғ… В· ${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;
      } catch (error) {
        console.warn(error);
        state.stocks = withModeScores(codes.map(makeStock)).sort((a, b) => b.score - a.score);
        state.dataSource = `дёңиҙўжӢүеҸ–еӨұиҙҘпјҢе·Із”ЁжЁЎжӢҹж•°жҚ®еӣһйҖҖ В· ${error.message}`;
      }
      if (!state.stocks.some(s => s.code === state.selected)) state.selected = state.stocks[0]?.code;
      state.refreshing = false;
      state.refreshIn = 30;
      render();
    }

    function queryCodesFromInput() {
      const input = document.getElementById("codesInput");
      const incoming = normalizeCodes(input.value);
      if (!incoming.length) {
        state.dataSource = "иҜ·иҫ“е…Ҙ6дҪҚиӮЎзҘЁд»Јз Ғ";
        render();
        return;
      }
      state.queryCodes = incoming.filter(code => !state.codes.includes(code));
      state.selected = incoming[incoming.length - 1] || state.selected;
      syncCodeInput("");
      generate();
    }

    function addCodesFromInput() {
      const input = document.getElementById("codesInput");
      const incoming = normalizeCodes(input.value);
      if (!incoming.length) {
        state.dataSource = "иҜ·иҫ“е…Ҙ6дҪҚиӮЎзҘЁд»Јз Ғ";
        render();
        return;
      }
      state.codes = [...new Set([...state.codes, ...incoming])];
      state.queryCodes = state.queryCodes.filter(code => !state.codes.includes(code) && !incoming.includes(code));
      state.selected = incoming[incoming.length - 1] || state.selected;
      saveCodes();
      syncCodeInput("");
      generate();
    }

    function removeCode(code) {
      state.codes = state.codes.filter(item => item !== code);
      state.queryCodes = state.queryCodes.filter(item => item !== code);
      if (!state.codes.length) state.codes = defaultCodes();
      if (state.selected === code) state.selected = state.codes[0];
      saveCodes();
      generate();
    }

    function fmtMoney(n) {
      const abs = Math.abs(n);
      if (abs >= 10000) return `${Math.round(n / 10000)}дёҮ`;
      return `${Math.round(n)}дёҮ`;
    }

    function updateRefreshControls() {
      const text = document.getElementById("refreshCountdown");
      const btn = document.getElementById("quickRefreshBtn");
      if (!text || !btn) return;
      text.textContent = state.refreshing ? "еҲ·ж–°дёӯ" : `еҲ·ж–° ${state.refreshIn}s`;
      btn.classList.toggle("refreshing", state.refreshing);
    }

    function scrollAnalysisIntoView() {
      if (window.matchMedia("(max-width: 640px)").matches) {
        document.getElementById("mainAnalysis")?.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function selectRelativeStock(offset) {
      if (!state.stocks.length) return;
      const index = Math.max(0, state.stocks.findIndex(stock => stock.code === state.selected));
      state.selected = state.stocks[(index + offset + state.stocks.length) % state.stocks.length].code;
      render();
      scrollAnalysisIntoView();
    }

    function renderMetrics() {
      const copy = modeCopy[state.mode];
      const heat = Math.round(state.stocks.reduce((sum, s) => sum + s.score, 0) / Math.max(1, state.stocks.length));
      const upPct = Math.round(state.stocks.filter(s => s.chg >= 0).length / Math.max(1, state.stocks.length) * 100);
      const limitCount = state.stocks.filter(s => s.chg > 9.5).length + Math.round(Math.random() * 4);
      const amount = state.stocks.reduce((sum, s) => sum + s.amount, 0).toFixed(2);
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      const vals = [`${heat}еҲҶ`, `${upPct}%`, limitCount, `${amount}дәҝ`, time];
      document.getElementById("metrics").innerHTML = copy.metrics.map((label, i) => `
        <div class="metric"><span>${label}</span><strong>${vals[i]}</strong></div>
      `).join("");
      document.getElementById("statusText").textContent = `${copy.status} В· ${state.dataSource}`;
    }

    function renderWatchlist() {
      document.getElementById("poolCount").textContent = `${state.stocks.length}еҸӘ`;
      document.getElementById("watchlist").innerHTML = state.stocks.map(stock => {
        const action = modeAdjustedAdvice(stock);
        const color = stock.chg >= 0 ? "price-up" : "price-down";
        return `
          <button class="watch-btn ${stock.code === state.selected ? "active" : ""}" data-code="${stock.code}">
            <span>
              <b>${stock.name}</b>
              <span class="code">${stock.code}${stock.industry ? ` В· ${stock.industry}` : ""}${state.queryCodes.includes(stock.code) ? " В· дёҙж—¶" : ""}</span>
            </span>
            <span class="watch-quote">
              <span class="watch-price ${color}">${stock.price}</span>
              <span class="watch-change ${color}">${stock.chg >= 0 ? "+" : ""}${stock.chg}%</span>
              <span class="watch-signal">${action[0]} В· ${stock.score}еҲҶ</span>
              <span class="watch-remove" data-remove-code="${stock.code}" title="еҲ йҷӨ"><i data-lucide="x"></i></span>
            </span>
          </button>
        `;
      }).join("");
      document.querySelectorAll(".watch-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selected = btn.dataset.code;
          render();
          scrollAnalysisIntoView();
        });
      });
      document.querySelectorAll(".watch-remove").forEach(btn => {
        btn.addEventListener("click", event => {
          event.stopPropagation();
          removeCode(btn.dataset.removeCode);
        });
      });
    }

    function explainLines(stock, action) {
      const upText = stock.chg >= 0 ? `еҪ“еүҚж¶ЁдәҶ${stock.chg}%` : `еҪ“еүҚи·ҢдәҶ${Math.abs(stock.chg)}%`;
      const netText = stock.net >= 0 ? "дё»еҠӣиө„йҮ‘еңЁжөҒе…ҘпјҢжүҝжҺҘиҝҳеңЁ" : "дё»еҠӣиө„йҮ‘еңЁжөҒеҮәпјҢзҹӯзәҝиҰҒйҳІе…‘зҺ°";
      if (state.mode === "auction") {
        return [
          `${stock.name}ејҖзӣҳд»·${stock.open ?? "--"}е…ғпјҢз«һд»·й«ҳејҖе№…еәҰзәҰ${stock.openPct ?? "--"}%гҖӮ`,
          `ејҖзӣҳеҗҺзӣёеҜ№ејҖзӣҳд»·${stock.openHold >= 0 ? "иө°ејә" : "иө°ејұ"}${Math.abs(stock.openHold ?? 0)}%пјҢиҝҷжҳҜеҲӨж–ӯз«һд»·жүҝжҺҘзҡ„ж ёеҝғгҖӮ`,
          `еҰӮжһңејҖзӣҳеҗҺдёҚз ҙ${stock.open ?? stock.support1}е…ғпјҢиҜҙжҳҺз«һд»·иө„йҮ‘жІЎжңүй©¬дёҠе…‘зҺ°гҖӮ`,
          `з¬¬дёҖд№°зӮ№зңӢ${stock.open ?? stock.support1}йҷ„иҝ‘жүҝжҺҘпјҢз¬¬дәҢд№°зӮ№зңӢ${stock.support1}йҷ„иҝ‘еӣһиё©гҖӮ`,
          `еҶІеҲ°${stock.pressure1}е…ғйҷ„иҝ‘иҰҒзңӢйҮҸиғҪпјҢжІЎйҮҸе®№жҳ“еҶІй«ҳеӣһиҗҪгҖӮ`,
          `${netText}пјҢз«һд»·зӯ–з•ҘжӣҙйҮҚи§ҶвҖңејҖзӣҳдёҚз ҙвҖқе’ҢвҖңеӣһиё©зј©йҮҸвҖқгҖӮ`,
          `з»“и®әпјҡ${action[0]}пјҢзҪ®дҝЎеәҰ${stock.confidence}%пјҢдёҚиҝҪз§’жқҝпјҢе…ҲзӯүејҖзӣҳеҗҺзҡ„з¬¬дёҖиҪ®жүҝжҺҘгҖӮ`
        ];
      }
      if (state.mode === "intraday") {
        return [
          `${stock.name}зҺ°д»·${stock.price}е…ғпјҢ${upText}гҖӮ`,
          `еҲҶж—¶дҪҚзҪ®еңЁе…ЁеӨ©еҢәй—ҙзҡ„${stock.closePos ?? 50}%йҷ„иҝ‘пјҢдҪҚзҪ®и¶Ҡй«ҳи¶ҠиҰҒзЎ®и®ӨйҮҸиғҪгҖӮ`,
          `${netText}пјҢеӨ§еҚ•ж–№еҗ‘еҶіе®ҡзӣҳдёӯеј№жҖ§гҖӮ`,
          `дёӢж–№ж”Ҝж’‘зңӢ${stock.support1}е…ғпјҢи·Ңз ҙиҜҙжҳҺзӣҳдёӯжүҝжҺҘеҸҳејұгҖӮ`,
          `дёҠж–№еҺӢеҠӣзңӢ${stock.pressure1}е…ғпјҢж”ҫйҮҸзӘҒз ҙжүҚжӣҙеғҸжңүж•Ҳиҝӣж”»гҖӮ`,
          `жҚўжүӢзҺҮ${stock.turnover ?? "--"}%пјҢжҲҗдәӨйўқ${stock.amount}дәҝпјҢеҶіе®ҡиғҪдёҚиғҪеҒҡTгҖӮ`,
          `з»“и®әпјҡ${action[0]}пјҢзӣҳдёӯдёҚзЎ®е®ҡжҖ§жӣҙй«ҳпјҢд»“дҪҚиҰҒжҜ”з«һд»·и®ЎеҲ’жӣҙзҒөжҙ»гҖӮ`
        ];
      }
      return [
        `${stock.name}е°ҫзӣҳд»·ж ј${stock.price}е…ғпјҢ${upText}гҖӮ`,
        `ж”¶зӣҳдҪҚзҪ®еңЁе…ЁеӨ©еҢәй—ҙзҡ„${stock.closePos ?? 50}%йҷ„иҝ‘пјҢи¶Ҡйқ иҝ‘й«ҳдҪҚи¶Ҡе®№жҳ“жңүйҡ”еӨңйў„жңҹгҖӮ`,
        `${netText}пјҢе°ҫзӣҳжӣҙжҖ•жӢүй«ҳеҮәиҙ§гҖӮ`,
        `жҳҺж—Ҙи§ӮеҜҹд»·е…ҲзңӢ${stock.pressure1}е…ғпјҢиҝҮдёҚеҺ»е°ұе®№жҳ“иҪ¬йңҮиҚЎгҖӮ`,
        `йҡ”еӨңйЈҺжҺ§зәҝж”ҫеңЁ${stock.stop}е…ғпјҢдҪҺејҖз ҙдҪҚиҰҒдјҳе…ҲеӨ„зҗҶйЈҺйҷ©гҖӮ`,
        `еҰӮжһңе°ҫзӣҳз«ҷдёҚзЁі${stock.support1}е…ғпјҢжҳҺеӨ©е…ҲжҢүејұдҝ®еӨҚзңӢгҖӮ`,
        `з»“и®әпјҡ${action[0]}пјҢе°ҫзӣҳйҮҚзӮ№дёҚжҳҜиҝҪж¶ЁпјҢиҖҢжҳҜеҶіе®ҡиҰҒдёҚиҰҒз•ҷд»“иҝҮеӨңгҖӮ`
      ];
    }

    function modeKeyValues(stock, shares, buy, stop) {
      if (state.mode === "auction") {
        return {
          left: [
            ["з«һд»·/ејҖзӣҳд»·", stock.open ?? "--"],
            ["й«ҳејҖе№…еәҰ", `${stock.openPct ?? "--"}%`],
            ["ејҖзӣҳжүҝжҺҘ", `${stock.openHold ?? "--"}%`],
            ["з«һд»·жҲҗдәӨйўқ", `${stock.amount}дәҝ`],
            ["йў„и®ЎеҸҜд№°", shares > 0 ? `${shares}иӮЎ / зәҰ${Math.round(shares * buy)}е…ғ` : "иө„йҮ‘дёҚи¶ідёҖжүӢ"]
          ],
          right: [
            ["еӣһиё©д№°зӮ№", stock.support1],
            ["еҶІй«ҳеҺӢеҠӣ", stock.pressure1],
            ["з«һд»·еӨұж•Ҳзәҝ", stop],
            ["дё»еҠӣеҮҖйўқ", fmtMoney(stock.net), stock.net >= 0 ? "price-up" : "price-down"],
            ["иЎҢдёҡ", stock.industry || "--"]
          ]
        };
      }
      if (state.mode === "intraday") {
        return {
          left: [
            ["зҺ°д»·", stock.price],
            ["ж—ҘеҶ…дҪҚзҪ®", `${stock.closePos ?? "--"}%`],
            ["жҚўжүӢзҺҮ", `${stock.turnover ?? "--"}%`],
            ["жҲҗдәӨйўқ", `${stock.amount}дәҝ`],
            ["йў„и®ЎеҸҜд№°", shares > 0 ? `${shares}иӮЎ / зәҰ${Math.round(shares * buy)}е…ғ` : "иө„йҮ‘дёҚи¶ідёҖжүӢ"]
          ],
          right: [
            ["зӣҳдёӯж”Ҝж’‘", stock.support1],
            ["зӣҳдёӯеҺӢеҠӣ", stock.pressure1],
            ["еҒҡTжӯўжҚҹ", stop],
            ["дё»еҠӣеҮҖйўқ", fmtMoney(stock.net), stock.net >= 0 ? "price-up" : "price-down"],
            ["зӯ№з ҒйӣҶдёӯеәҰ", stock.concentration]
          ]
        };
      }
      return {
        left: [
          ["е°ҫзӣҳд»·", stock.price],
          ["ж”¶зӣҳдҪҚзҪ®", `${stock.closePos ?? "--"}%`],
          ["е…ЁеӨ©жңҖй«ҳ", stock.high ?? "--"],
          ["е…ЁеӨ©жңҖдҪҺ", stock.low ?? "--"],
          ["йў„и®ЎеҸҜд№°", shares > 0 ? `${shares}иӮЎ / зәҰ${Math.round(shares * buy)}е…ғ` : "иө„йҮ‘дёҚи¶ідёҖжүӢ"]
        ],
        right: [
          ["жҳҺж—Ҙи§ӮеҜҹд»·", stock.pressure1],
          ["йҡ”еӨңйЈҺжҺ§зәҝ", stop],
          ["дҪҺејҖжүҝжҺҘдҪҚ", stock.support1],
          ["дё»еҠӣеҮҖйўқ", fmtMoney(stock.net), stock.net >= 0 ? "price-up" : "price-down"],
          ["йҡ”еӨңйЈҺйҷ©", `${stock.risk}еҲҶ`]
        ]
      };
    }

    function modeScoreLabels() {
      if (state.mode === "auction") return ["з«һд»·ејәеәҰ", "ејҖзӣҳжүҝжҺҘ", "иҝҮж»ӨйЈҺйҷ©"];
      if (state.mode === "intraday") return ["зӣҳдёӯејәеәҰ", "йҮҸд»·еҠЁиғҪ", "еҒҡTз©әй—ҙ"];
      return ["йҡ”еӨңйў„жңҹ", "ж”¶зӣҳдҪҚзҪ®", "йҡ”еӨңйЈҺйҷ©"];
    }

    function modeBarLabels() {
      if (state.mode === "auction") return ["й«ҳејҖжңүж•ҲзҺҮ", "з«һд»·е…‘зҺ°йЈҺйҷ©", "з«һд»·жөҒеҠЁжҖ§"];
      if (state.mode === "intraday") return ["дёҠж”»жҰӮзҺҮ", "еӣһж’ӨжҰӮзҺҮ", "еҲҶж—¶жөҒеҠЁжҖ§"];
      return ["жҳҺж—Ҙжәўд»·зҺҮ", "йҡ”еӨңйЈҺйҷ©", "е°ҫзӣҳжөҒеҠЁжҖ§"];
    }

    function actionCards(stock, buy, sell) {
      if (state.mode === "auction") {
        return [
          ["дёҚиҝҪй«ҳејҖ", `й«ҳејҖеҗҺе…ҲзңӢ${stock.open ?? buy}жҳҜеҗҰе®ҲдҪҸпјҢз ҙдәҶе°ұиҝҮж»Ө`],
          ["еӣһиё©дҪҺеҗё", `еӣһиё©${buy}йҷ„иҝ‘зј©йҮҸгҖҒжңүжүҝжҺҘеҶҚиҖғиҷ‘`],
          ["еҶІй«ҳе…‘зҺ°", `йқ иҝ‘${sell}жІЎз»§з»ӯж”ҫйҮҸпјҢе…ҲиҗҪиўӢдёҖйғЁеҲҶ`],
          ["з«һд»·еӨұж•Ҳ", `ејҖзӣҳжҖҘи·Ңз ҙ${stock.support1}пјҢж”ҫејғз«һд»·и®ЎеҲ’`]
        ];
      }
      if (state.mode === "intraday") {
        return [
          ["зӣҳдёӯдҪҺеҗё", `еӣһиё©${buy}дёҚз ҙпјҢдё”дё»еҠӣеҮҖйўқдёҚз»§з»ӯжҒ¶еҢ–`],
          ["еҒҡTй«ҳжҠӣ", `еҶІеҲ°${sell}йҷ„иҝ‘зңӢеҚ–еҺӢпјҢиҪ¬ејұе°ұеҮҸ`],
          ["иҝҪж¶ЁжқЎд»¶", `ж”ҫйҮҸзӘҒз ҙ${sell}еҗҺеҶҚзңӢеҠ йҖҹпјҢдёҚжҸҗеүҚжҠў`],
          ["йЈҺйҷ©еӨ„зҗҶ", `и·Ңз ҙ${stock.stop}пјҢзҹӯзәҝи®ЎеҲ’еӨұж•Ҳ`]
        ];
      }
      return [
        ["з•ҷд»“жқЎд»¶", `ж”¶еңЁ${stock.support1}дёҠж–№дё”е°ҫзӣҳдёҚи·іж°ҙ`],
        ["йҡ”еӨңд»“дҪҚ", `еҸӘз•ҷзЎ®и®Өд»“пјҢдёҚжҠҠзӣҳдёӯеҲ©ж¶Ұе…ЁеҺӢиҝҮеӨң`],
        ["жҳҺж—Ҙй«ҳејҖ", `й«ҳејҖеҶІ${sell}е…ҲзңӢе…‘зҺ°пјҢдёҚзӣІзӣ®еҠ д»“`],
        ["жҳҺж—ҘдҪҺејҖ", `дҪҺејҖз ҙ${stock.stop}е…ҲжҺ§йЈҺйҷ©пјҢеҶҚзӯүдҝ®еӨҚ`]
      ];
    }

    function sectorPulse(stock) {
      const peers = state.stocks.filter(item => item.industry && item.industry === stock.industry);
      const count = peers.length || 1;
      const avg = Math.round(peers.reduce((sum, item) => sum + item.score, 0) / count);
      const upCount = peers.filter(item => item.chg >= 0).length;
      const leader = [...peers].sort((a, b) => b.score - a.score)[0] || stock;
      const role = leader.code === stock.code ? "жқҝеқ—йўҶж¶Ё/ж ёеҝғеҖҷйҖү" : `и·ҹйҡҸ ${leader.name}`;
      const strength = avg >= 75 ? "ејәдё»зәҝ" : avg >= 60 ? "еҸҜжҢҒз»ӯи§ӮеҜҹ" : "ејұиҪ®еҠЁ";
      return { count, avg, upCount, leader, role, strength };
    }

    function tradeTriggers(stock) {
      const buyLow = stock.support1;
      const buyHigh = +(stock.support1 * 1.012).toFixed(priceDigits(stock.price));
      const noChase = +(stock.pressure1 * .99).toFixed(priceDigits(stock.price));
      const stop = stock.stop;
      const position = stock.stRiskLevel === "й«ҳ" ? "0жҲҗпјҢе…ҲжҺ’йҷӨ" : stock.score >= 80 ? "2-3жҲҗиҜ•д»“" : stock.score >= 65 ? "1-2жҲҗдҪҺеҗё" : "0-1жҲҗи§ӮеҜҹ";
      return {
        buyZone: `${buyLow}-${buyHigh}`,
        noChase: `${noChase}д»ҘдёҠдёҚиҝҪ`,
        stop,
        takeProfit: stock.pressure1,
        position,
        condition: stock.net >= 0 ? "дё»еҠӣеҮҖйўқдёҚиҪ¬иҙҹдё”еӣһиё©зј©йҮҸ" : "е…Ҳзӯүдё»еҠӣеҮҖйўқиҪ¬жӯЈ"
      };
    }

    function holdingView(stock) {
      const holding = readHolding(stock.code);
      const cost = Number(holding.cost) || 0;
      const shares = Number(holding.shares) || 0;
      const profit = cost > 0 && shares > 0 ? (stock.price - cost) * shares : 0;
      const profitPct = cost > 0 ? ((stock.price / cost - 1) * 100) : 0;
      const maxRisk = cost > 0 && shares > 0 ? Math.max(0, (cost - stock.stop) * shares) : 0;
      const plan = !cost || !shares
        ? "жңӘеЎ«еҶҷжҢҒд»“пјҢжҢүи§ӮеҜҹи®ЎеҲ’еӨ„зҗҶгҖӮ"
        : profit >= 0
          ? `жө®зӣҲ${profitPct.toFixed(1)}%пјҢеҶІеҲ°${stock.pressure1}йҷ„иҝ‘еҸҜеҲҶжү№е…‘зҺ°гҖӮ`
          : `жө®дәҸ${Math.abs(profitPct).toFixed(1)}%пјҢи·Ңз ҙ${stock.stop}дјҳе…ҲжҺ§еҲ¶йЈҺйҷ©гҖӮ`;
      return { holding, cost, shares, profit, profitPct, maxRisk, plan };
    }

    function pageAlerts(stock) {
      const alerts = [];
      if (stock.stRiskLevel === "й«ҳ") alerts.push(["danger", "еҹәжң¬йқў/STйЈҺйҷ©й«ҳпјҡдјҳе…ҲжҺ’йҷӨпјҢдёҚеҸӮдёҺзҹӯзәҝеҚҡејҲгҖӮ"]);
      if (stock.price <= stock.stop) alerts.push(["danger", `е·ІжҺҘиҝ‘/и·Ңз ҙжӯўжҚҹзәҝ ${stock.stop}пјҢе…ҲеӨ„зҗҶйЈҺйҷ©гҖӮ`]);
      if (stock.price >= stock.pressure1) alerts.push(["warn", `е·ІеҲ°еҺӢеҠӣдҪҚ ${stock.pressure1} йҷ„иҝ‘пјҢжіЁж„ҸеҶІй«ҳе…‘зҺ°гҖӮ`]);
      if (stock.net < 0) alerts.push(["warn", `дё»еҠӣеҮҖйўқдёә ${fmtMoney(stock.net)}пјҢзӣҳдёӯдёҚиҰҒзӣІзӣ®еҠ д»“гҖӮ`]);
      if (stock.score >= 80 && stock.net >= 0) alerts.push(["", "ејәеҠҝдҝЎеҸ·пјҡеӣһиё©дёҚз ҙж”Ҝж’‘дё”зј©йҮҸж—¶дјҳе…Ҳи§ӮеҜҹдҪҺеҗёгҖӮ"]);
      if (!alerts.length) alerts.push(["", "жҡӮж— ејәйў„иӯҰпјҢжҢүи®ЎеҲ’и§ӮеҜҹж”Ҝж’‘гҖҒеҺӢеҠӣе’Ңиө„йҮ‘ж–№еҗ‘гҖӮ"]);
      return alerts;
    }

    function scoreReviewItem(item) {
      const stock = state.stocks.find(s => s.code === item.code);
      if (!stock) {
        return { label: "еҫ…жӣҙж–°", cls: "", detail: "еҪ“еүҚзӣ‘жҺ§жұ жҡӮж— иҜҘиӮЎзҘЁиЎҢжғ…" };
      }
      const move = item.price > 0 ? ((stock.price / item.price - 1) * 100) : 0;
      const bullish = /е…іжіЁ|дҪҺеҗё|еҗёзӯ№|йҡ”еӨң|еҖҷйҖү|и§ӮеҜҹ/.test(item.action);
      const bearish = /еҮәиҙ§|и°Ёж…Һ|дёҚйҡ”еӨң|жҺ’йҷӨ/.test(item.action);
      if (bullish && stock.price >= item.pressure) {
        return { label: "е‘ҪдёӯеҺӢеҠӣ", cls: "safe", detail: `зҺ°д»·${stock.price}пјҢиҫғи®°еҪ•${move.toFixed(1)}%` };
      }
      if (bullish && item.targetPrice && stock.price >= item.targetPrice) {
        return { label: "е‘Ҫдёӯзӣ®ж Ү", cls: "safe", detail: `зҺ°д»·${stock.price}пјҢе·Іиҫҫзӣ®ж Үд»·${item.targetPrice}` };
      }
      if (bullish && stock.price <= item.stop) {
        return { label: "и§ҰеҸ‘жӯўжҚҹ", cls: "danger", detail: `зҺ°д»·${stock.price}пјҢжӯўжҚҹзәҝ${item.stop}` };
      }
      if (bearish && stock.price <= item.price) {
        return { label: "йЈҺйҷ©еҲӨж–ӯжңүж•Ҳ", cls: "safe", detail: `зҺ°д»·${stock.price}пјҢиҫғи®°еҪ•${move.toFixed(1)}%` };
      }
      if (bearish && stock.price > item.pressure) {
        return { label: "йЈҺйҷ©иҜҜеҲӨ", cls: "danger", detail: `зҺ°д»·${stock.price}пјҢе·ІзӘҒз ҙ${item.pressure}` };
      }
      if (Math.abs(move) >= 3) {
        return { label: move > 0 ? "жө®зӣҲи§ӮеҜҹ" : "иө°ејұи§ӮеҜҹ", cls: move > 0 ? "safe" : "warn", detail: `иҫғи®°еҪ•${move.toFixed(1)}%` };
      }
      return { label: "жңӘи§ҰеҸ‘", cls: "", detail: `зҺ°д»·${stock.price}пјҢиҫғи®°еҪ•${move.toFixed(1)}%` };
    }

    function reviewStats(items) {
      const scored = items.map(item => scoreReviewItem(item));
      const done = scored.filter(s => /е‘Ҫдёӯ|жңүж•Ҳ|жӯўжҚҹ|иҜҜеҲӨ/.test(s.label));
      const wins = done.filter(s => /е‘Ҫдёӯ|жңүж•Ҳ/.test(s.label)).length;
      return {
        total: items.length,
        done: done.length,
        wins,
        winRate: done.length ? Math.round(wins / done.length * 100) : 0
      };
    }

            </div>

              <div class="big-price ${stock.chg >= 0 ? "price-up" : "price-down"}">${stock.price}</div>

    function renderCandidates() {
      const list = [...state.stocks].sort((a, b) => b.score - a.score);
      document.getElementById("candidateCount").textContent = `${list.length}еҸӘ`;
      document.getElementById("candidates").innerHTML = list.map(stock => {
        const action = modeAdjustedAdvice(stock);
        const stText = stock.stRiskLevel === "й«ҳ"
          ? " еҹәжң¬йқўйЈҺйҷ©й«ҳпјҢдјҳе…ҲжҺ’йҷӨгҖӮ"
          : stock.stRiskLevel === "дёӯ"
            ? " еҹәжң¬йқўжңүз‘•з–өпјҢйҷҚдҪҺд»“дҪҚгҖӮ"
            : " STйЈҺйҷ©дҪҺгҖӮ";
        const reason = state.mode === "auction"
          ? `${action[0]}пјҡйҮҚзӮ№зңӢејҖзӣҳд»·${stock.open ?? "--"}иғҪеҗҰе®ҲдҪҸпјҢз«һд»·й«ҳејҖ${stock.openPct ?? "--"}%пјҢжүҝжҺҘ${stock.openHold ?? "--"}%гҖӮ`
          : state.mode === "intraday"
            ? `${action[0]}пјҡдјҳе…ҲзңӢ${stock.support1}йҷ„иҝ‘жүҝжҺҘпјҢеҲҶж—¶дҪҚзҪ®${stock.closePos ?? "--"}%пјҢдё»еҠӣеҮҖйўқ${fmtMoney(stock.net)}гҖӮ`
            : `${action[0]}пјҡж”¶зӣҳдҪҚзҪ®${stock.closePos ?? "--"}%пјҢжҳҺж—Ҙи§ӮеҜҹ${stock.pressure1}пјҢйҡ”еӨңйЈҺжҺ§${stock.stop}гҖӮ`;
        return `
          <div class="candidate">
            <div class="candidate-top">
              <span>${stock.name} ${stock.code}</span>
              <span class="score-pill">${stock.score}</span>
            </div>
            <p>${reason} йЈҺйҷ©${stock.risk}еҲҶгҖӮ${stText}</p>
          </div>
        `;
      }).join("");
    }

    function bindTargetInputs() {
      document.querySelectorAll(".target-profit-input, .target-pe-input").forEach(input => {
        input.addEventListener("change", () => {
          const code = input.dataset.code;
          const profitInput = document.querySelector(`.target-profit-input[data-code="${code}"]`);
          const peInput = document.querySelector(`.target-pe-input[data-code="${code}"]`);
          const config = {};
          if (profitInput?.value.trim()) config.profit = Number(profitInput.value);
          if (peInput?.value.trim()) config.pe = Number(peInput.value);
          saveTargetConfig(code, config);
          render();
        });
      });
    }

    function bindToolInputs() {
      document.querySelectorAll("[data-view-mode]").forEach(button => {
        button.addEventListener("click", () => {
          state.simpleMode = button.dataset.viewMode === "simple";
          saveSimpleMode();
          render();
        });
      });
      document.querySelectorAll(".holding-cost-input, .holding-shares-input").forEach(input => {
        input.addEventListener("change", () => {
          const code = input.dataset.code;
          const costInput = document.querySelector(`.holding-cost-input[data-code="${code}"]`);
          const sharesInput = document.querySelector(`.holding-shares-input[data-code="${code}"]`);
          saveHolding(code, {
            cost: costInput?.value.trim() ? Number(costInput.value) : "",
            shares: sharesInput?.value.trim() ? Number(sharesInput.value) : ""
          });
          render();
        });
      });
      const toggle = document.getElementById("simpleModeToggle");
      if (toggle) {
        toggle.addEventListener("change", () => {
          state.simpleMode = toggle.checked;
          saveSimpleMode();
          render();
        });
      }
      const recordBtn = document.getElementById("recordReviewBtn");
      if (recordBtn) {
        recordBtn.addEventListener("click", () => {
          const stock = state.stocks.find(s => s.code === state.selected) || state.stocks[0];
          if (!stock) return;
          appendReview(stock, modeAdjustedAdvice(stock));
          render();
        });
      }
    }

    function render() {
      renderMetrics();
      renderWatchlist();
      renderMain();
      renderCandidates();
      bindTargetInputs();
      bindToolInputs();
      updateRefreshControls();
      lucide.createIcons();
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        state.mode = tab.dataset.mode;
        generate();
      });
    });

    document.getElementById("refreshBtn").addEventListener("click", addCodesFromInput);
    document.getElementById("queryBtn").addEventListener("click", queryCodesFromInput);
    document.getElementById("codesInput").addEventListener("keydown", event => {
      if (event.key === "Enter") addCodesFromInput();
    });
    document.getElementById("pullBtn").addEventListener("click", () => {
      generate();
    });
    document.getElementById("quickRefreshBtn").addEventListener("click", generate);
    document.getElementById("prevStockBtn").addEventListener("click", () => selectRelativeStock(-1));
    document.getElementById("nextStockBtn").addEventListener("click", () => selectRelativeStock(1));
    setInterval(() => {
      const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement?.tagName);
      if (document.body.classList.contains("locked") || document.hidden || state.refreshing || editing) {
        updateRefreshControls();
        return;
      }
      state.refreshIn -= 1;
      if (state.refreshIn <= 0) generate();
      else updateRefreshControls();
    }, 1000);
    state.codes = loadSavedCodes();
    loadSimpleMode();
    syncCodeInput("");
    setupAccessGate();
    if (!document.body.classList.contains("locked")) generate();
  </script>
</body>
</html>
