    function eastmoneyJsonp(url, timeout = 8000, callbackParam = "cb") {
      return new Promise((resolve, reject) => {
        const callback = `em_cb_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const script = document.createElement("script");
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("东财接口响应超时"));
        }, timeout);

        function cleanup() {
          clearTimeout(timer);
          delete window[callback];
          script.remove();
        }

        window[callback] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("东财接口加载失败"));
        };

        const separator = url.includes("?") ? "&" : "?";
        script.src = `${url}${separator}${callbackParam}=${callback}&_=${Date.now()}`;
        document.body.appendChild(script);
      });
    }

    async function fetchJson(url, timeout = 8000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal, cache: "no-store" });
        if (!response.ok) throw new Error(`接口响应 ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function asNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function priceDigits(price) {
      return Math.max(2, Math.min(3, String(price).split(".")[1]?.length || 2));
    }

    function average(values) {
      if (!values.length) return 0;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function rsi14(closes) {
      if (closes.length < 15) return 50;
      let gains = 0;
      let losses = 0;
      for (let i = closes.length - 14; i < closes.length; i++) {
        const change = closes[i] - closes[i - 1];
        if (change >= 0) gains += change;
        else losses += Math.abs(change);
      }
      if (!losses) return 100;
      const relativeStrength = (gains / 14) / (losses / 14);
      return 100 - 100 / (1 + relativeStrength);
    }

    function standardDeviation(values) {
      if (!values.length) return 0;
      const mean = average(values);
      return Math.sqrt(average(values.map(value => (value - mean) ** 2)));
    }

    function analyzeCycleStrategies(stock) {
      const trend = stock.trendData;
      const bars = trend?.bars || [];
      if (bars.length < 70) return null;
      const digits = priceDigits(stock.price);
      const closes = bars.map(item => item.close);
      const holding = readHolding(stock.code);
      const hasHolding = Number(holding.shares) > 0 && Number(holding.cost) > 0;
      const availableShares = Math.max(0, Number(holding.availableShares ?? holding.shares) || 0);
      const todayReduced = Math.max(0, Number(holding.todayReduced) || 0);
      const recommendedSell = availableShares < 100 ? availableShares : Math.max(100, Math.floor(availableShares * .25 / 100) * 100);
      const plan = getExecutionPlan(stock);
      const intradayBars = stock.intradayData?.bars?.filter(item => item.close > 0) || [];
      const latestMinute = intradayBars.at(-1);
      const atrValue = plan.atr || stock.price * trend.atr14 / 100;
      const pct = (current, previous) => previous ? ((current - previous) / previous) * 100 : 0;
      const ma5Before = average(closes.slice(-10, -5));
      const ma20Before = average(closes.slice(-25, -5));
      const ma60Before = average(closes.slice(-70, -10));
      const shortMomentum = pct(closes.at(-1), closes.at(-6));
      const mediumMomentum = pct(closes.at(-1), closes.at(-21));
      const longMomentum = pct(closes.at(-1), closes.at(-61));

      let shortScore = 0;
      if (stock.price > trend.ma5 && trend.ma5 > trend.ma10) shortScore += 2;
      else if (stock.price < trend.ma5 && trend.ma5 < trend.ma10) shortScore -= 2;
      if (trend.ma5 > ma5Before) shortScore += 1;
      else shortScore -= 1;
      if (shortMomentum > 2) shortScore += 1;
      else if (shortMomentum < -2) shortScore -= 1;
      const shortState = shortScore >= 3 ? "短期上升" : shortScore <= -3 ? "短期下降" : shortScore > 0 ? "短期偏强震荡" : shortScore < 0 ? "短期偏弱震荡" : "短期横盘";

      let longScore = 0;
      if (trend.ma20 > trend.ma60) longScore += 2;
      else longScore -= 2;
      if (trend.ma20 > ma20Before) longScore += 1;
      else longScore -= 1;
      if (trend.ma60 > ma60Before) longScore += 1;
      else longScore -= 1;
      if (longMomentum > 8) longScore += 1;
      else if (longMomentum < -8) longScore -= 1;
      const longState = longScore >= 3 ? "长期上升" : longScore <= -3 ? "长期下降" : "长期震荡筑底";

      const daySell = +Math.min(plan.target1, Math.max(plan.breakout, plan.buyHigh + atrValue * .35)).toFixed(digits);
      const daySpread = plan.buyHigh ? ((daySell - plan.buyHigh) / plan.buyHigh) * 100 : 0;
      let dayTState = hasHolding && availableShares > 0 ? "等待到价" : "无可卖底仓，不做日内T";
      let dayTAction = hasHolding && availableShares > 0 ? `可卖${availableShares}股；冲高至${daySell}附近减，回到${plan.buyLow}-${plan.buyHigh}接回` : "A股当日买入不能当日卖出，请填写可卖底仓";
      let dayTCls = hasHolding && availableShares > 0 ? "warn" : "danger";
      if (hasHolding && availableShares > 0 && daySpread < .8) {
        dayTState = "波差不足";
        dayTAction = `计划波差仅${daySpread.toFixed(1)}%，不够覆盖滑点与误差`;
        dayTCls = "danger";
      } else if (hasHolding && availableShares > 0 && stock.price >= daySell) {
        dayTState = "日内T卖点观察";
        dayTAction = `参考减${recommendedSell}股（约25%可卖底仓），接回区固定为${plan.buyLow}-${plan.buyHigh}`;
        dayTCls = "safe";
      } else if (hasHolding && availableShares > 0 && stock.price >= plan.buyLow && stock.price <= plan.buyHigh && shortScore >= 0) {
        dayTState = "日内T接回观察";
        dayTAction = todayReduced > 0 ? `最多接回今日已减的${todayReduced}股，不扩大总仓位` : "今日已减数量为0，先登记卖出后再考虑接回";
        dayTCls = "safe";
      }

      const waveBuyLow = +Math.min(trend.ma10, trend.ma20).toFixed(digits);
      const waveBuyHigh = +Math.max(trend.ma10, trend.ma20).toFixed(digits);
      const waveSell = +Math.min(trend.high20, trend.bollUpper).toFixed(digits);
      const waveAllowed = longScore >= 0 && marketRegimeStatus(stock).score >= 40;
      let waveState = !hasHolding ? "建仓后启用" : waveAllowed ? "波段区间有效" : "下降趋势，暂停做T";
      let waveAction = !hasHolding
        ? "当前只看结构，不把波段T当成首次建仓信号"
        : waveAllowed
          ? `回撤${waveBuyLow}-${waveBuyHigh}止跌再加，接近${waveSell}分批减`
          : `MA20/MA60趋势未改善，不用补仓摊低成本`;
      let waveCls = waveAllowed ? "warn" : "danger";
      if (hasHolding && waveAllowed && stock.price >= waveSell) {
        waveState = "波段T减仓区";
        waveAction = "减仓后等日线回撤，不在高位当天追接";
        waveCls = "safe";
      }

      const previous20 = bars.slice(-21, -1);
      const priorHigh20 = Math.max(...previous20.map(item => item.high));
      const currentBar = bars.at(-1);
      const avgVolume20 = average(previous20.map(item => item.volume));
      const topSignals = [
        { pass: trend.rsi14 >= 72, text: `RSI ${trend.rsi14}` },
        { pass: trend.position20 >= 85, text: `20日高位${trend.position20}%` },
        { pass: stock.price >= trend.ma20 * (1 + Math.max(8, trend.atr14 * 2) / 100), text: "偏离MA20过大" },
        { pass: currentBar.volume > avgVolume20 * 1.5 && stock.closePos < 65, text: "放量滞涨" },
        { pass: stock.net < 0 && stock.mainNetRatio < 0, text: "主力流出" },
        { pass: currentBar.high > priorHigh20 && stock.price < priorHigh20, text: "突破失败" }
      ];
      const topHits = topSignals.filter(item => item.pass);
      const topLevel = topHits.length >= 3 ? "高" : topHits.length === 2 ? "中" : "低";
      const topState = topLevel === "高" ? "逃顶减仓预警" : topLevel === "中" ? "顶部风险观察" : "未见顶部共振";
      const topAction = topLevel === "高"
        ? "已有仓位分批兑现，不一次清仓；跌破MA5再继续减"
        : topLevel === "中" ? "停止追高，观察量价是否继续背离" : "按原止盈和止损计划管理";

      const nearLowerBand = stock.price <= trend.bollLower * 1.02;
      const volumeContraction = currentBar.volume < avgVolume20 * .85;
      const bottomSignals = [
        { pass: trend.rsi14 <= 32, text: `RSI ${trend.rsi14}` },
        { pass: trend.position20 <= 15, text: `20日低位${trend.position20}%` },
        { pass: nearLowerBand, text: "接近布林下轨" },
        { pass: volumeContraction, text: "缩量杀跌" },
        { pass: stock.net > 0 && stock.mainNetRatio > 0, text: "资金回流" }
      ];
      const bottomHits = bottomSignals.filter(item => item.pass);
      const reversalConfirmed = Boolean(latestMinute?.avgPrice > 0 && stock.change5m > 0 && stock.price >= latestMinute.avgPrice && stock.mainNetRatio >= 0);
      const bottomReady = bottomHits.length >= 3 && reversalConfirmed && longScore > -3;
      const bottomState = bottomReady ? "抄底试仓观察" : bottomHits.length >= 3 ? "超跌但未止跌" : "未到抄底区";
      const bottomAction = bottomReady
        ? "只允许小仓试错，仍以固定止损为准，不把反弹当反转"
        : bottomHits.length >= 3 ? "等待站回分时均价、5分钟转强和资金回流" : "不提前猜底，不因连续下跌补仓";

      const items = [
        { name: "短期趋势", state: shortState, cls: shortScore >= 2 ? "safe" : shortScore <= -2 ? "danger" : "warn", detail: `5日${shortMomentum >= 0 ? "+" : ""}${shortMomentum.toFixed(1)}% · MA5斜率${trend.ma5 >= ma5Before ? "向上" : "向下"}`, action: shortScore >= 2 ? "顺势持有，回撤只看固定计划" : shortScore <= -2 ? "不追涨，反弹优先控仓" : "等待方向选择" },
        { name: "长期趋势", state: longState, cls: longScore >= 2 ? "safe" : longScore <= -2 ? "danger" : "warn", detail: `20日${mediumMomentum >= 0 ? "+" : ""}${mediumMomentum.toFixed(1)}% · 60日${longMomentum >= 0 ? "+" : ""}${longMomentum.toFixed(1)}%`, action: longScore >= 2 ? "波段仓可沿MA20管理" : longScore <= -2 ? "反弹按反弹处理，禁止补仓摊平" : "控制中线仓位" },
        { name: "日内T（已有底仓）", state: dayTState, cls: dayTCls, detail: `固定卖出参考${daySell} · 接回${plan.buyLow}-${plan.buyHigh}`, action: dayTAction },
        { name: "波段T（日线级）", state: waveState, cls: waveCls, detail: `MA10/20区${waveBuyLow}-${waveBuyHigh} · 上沿${waveSell}`, action: waveAction },
        { name: "逃顶策略", state: topState, cls: topLevel === "高" ? "danger" : topLevel === "中" ? "warn" : "safe", detail: topHits.length ? topHits.map(item => item.text).join(" · ") : "高位、背离、量价和资金均未共振", action: topAction },
        { name: "抄底策略", state: bottomState, cls: bottomReady ? "safe" : bottomHits.length >= 3 ? "warn" : "danger", detail: `${bottomHits.length}/5项超跌 · ${reversalConfirmed ? "已见止跌确认" : "尚无止跌确认"}`, action: bottomAction }
      ];
      return { items, shortScore, longScore, topLevel, bottomReady, topHits, bottomHits, dayTState, waveState };
    }

    function renderCycleStrategyPanel(stock) {
      const analysis = analyzeCycleStrategies(stock);
      if (!analysis) {
        return `
          <section class="cycle-panel">
            <div class="cycle-head"><div class="section-title"><i data-lucide="chart-no-axes-combined"></i>多周期交易策略</div><span class="confirm-summary warn">正在加载日线和分钟线</span></div>
          </section>
        `;
      }
      const summary = analysis.topLevel === "高" ? "顶部风险优先" : analysis.bottomReady ? "超跌止跌观察" : analysis.shortScore >= 2 && analysis.longScore >= 2 ? "长短趋势共振" : "周期信号分化";
      const summaryCls = analysis.topLevel === "高" ? "danger" : analysis.shortScore >= 2 && analysis.longScore >= 2 ? "safe" : "warn";
      return `
        <section class="cycle-panel">
          <div class="cycle-head">
            <div><div class="section-title"><i data-lucide="chart-no-axes-combined"></i>多周期交易策略</div><span>日内T仅限已有可卖底仓；逃顶和抄底都要求多指标共振</span></div>
            <span class="confirm-summary ${summaryCls}">${summary}</span>
          </div>
          <div class="cycle-grid">
            ${analysis.items.map(item => `<div class="cycle-item ${item.cls}"><span>${item.name}</span><b>${item.state}</b><small>${item.detail}</small><em>${item.action}</em></div>`).join("")}
          </div>
        </section>
      `;
    }

    function renderPriceChart(stock) {
      const plan = getExecutionPlan(stock);
      const cycle = analyzeCycleStrategies(stock);
      const width = 720;
      const height = 300;
      const left = 44;
      const right = 690;
      const top = 16;
      const bottom = 260;
      const mode = state.chartMode;
      const daily = (stock.trendData?.bars || []).slice(-50);
      const minutes = (stock.intradayData?.bars || []).filter(item => item.close > 0);
      const source = mode === "intraday" ? minutes : daily;
      if (source.length < 2) return `<section class="price-chart-panel"><div class="section-title"><i data-lucide="candlestick-chart"></i>价格图与策略标记</div><div class="code">行情数据加载中...</div></section>`;
      const rawHighs = source.map(item => item.high || item.close);
      const rawLows = source.map(item => item.low || item.close);
      const levelValues = [plan.buyLow, plan.buyHigh, plan.stop, plan.target1, plan.target2].filter(Boolean);
      let high = Math.max(...rawHighs, ...levelValues);
      let low = Math.min(...rawLows, ...levelValues);
      const padding = Math.max((high - low) * .08, stock.price * .005);
      high += padding;
      low -= padding;
      const xAt = index => left + index * (right - left) / Math.max(1, source.length - 1);
      const yAt = value => top + (high - value) / Math.max(.001, high - low) * (bottom - top);
      const grids = Array.from({ length: 5 }, (_, index) => {
        const value = high - (high - low) * index / 4;
        const y = yAt(value);
        return `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="#1c2a38" stroke-width="1"/><text x="4" y="${y + 4}" fill="#7990a5" font-size="10">${value.toFixed(priceDigits(stock.price))}</text>`;
      }).join("");
      const levels = [
        ["低吸下", plan.buyLow, "#ff5b6b"],
        ["低吸上", plan.buyHigh, "#ff8794"],
        ["止损", plan.stop, "#2adf76"],
        ["止盈1", plan.target1, "#ffbd3e"],
        ["止盈2", plan.target2, "#e09c32"]
      ].map(([label, value, color]) => {
        const y = yAt(value);
        return `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="${color}" stroke-width="1" stroke-dasharray="5 5" opacity=".8"/><text x="${right - 2}" y="${y - 3}" text-anchor="end" fill="${color}" font-size="10">${label} ${value}</text>`;
      }).join("");
      let plot = "";
      if (mode === "intraday") {
        const points = source.map((item, index) => `${xAt(index).toFixed(1)},${yAt(item.close).toFixed(1)}`).join(" ");
        const avgPoints = source.map((item, index) => item.avgPrice > 0 ? `${xAt(index).toFixed(1)},${yAt(item.avgPrice).toFixed(1)}` : "").filter(Boolean).join(" ");
        plot = `<polyline points="${points}" fill="none" stroke="#43a5ff" stroke-width="2"/><polyline points="${avgPoints}" fill="none" stroke="#ffbd3e" stroke-width="1.2" opacity=".9"/>`;
      } else {
        const candleWidth = Math.max(2, Math.min(8, (right - left) / source.length * .55));
        plot = source.map((item, index) => {
          const x = xAt(index);
          const up = item.close >= item.open;
          const color = up ? "#ff596a" : "#28d76f";
          const bodyTop = yAt(Math.max(item.open, item.close));
          const bodyBottom = yAt(Math.min(item.open, item.close));
          return `<line x1="${x}" y1="${yAt(item.high)}" x2="${x}" y2="${yAt(item.low)}" stroke="${color}"/><rect x="${x - candleWidth / 2}" y="${bodyTop}" width="${candleWidth}" height="${Math.max(1, bodyBottom - bodyTop)}" fill="${up ? color : "#091018"}" stroke="${color}"/>`;
        }).join("");
        const fullBars = stock.trendData.bars;
        const maLine = period => source.map((item, index) => {
          const fullIndex = fullBars.findIndex(bar => bar.date === item.date);
          const value = average(fullBars.slice(Math.max(0, fullIndex - period + 1), fullIndex + 1).map(bar => bar.close));
          return `${xAt(index).toFixed(1)},${yAt(value).toFixed(1)}`;
        }).join(" ");
        plot += `<polyline points="${maLine(5)}" fill="none" stroke="#ffd05b" stroke-width="1.2"/><polyline points="${maLine(20)}" fill="none" stroke="#8d7cff" stroke-width="1.2"/>`;
      }
      const ledger = readSignalLedger().filter(item => item.code === stock.code);
      const marks = mode === "daily" ? ledger.map(item => {
        const index = source.findIndex(bar => bar.date === item.date);
        if (index < 0) return "";
        const y = yAt(item.price);
        const color = item.direction === "up" ? "#ff596a" : "#28d76f";
        return `<circle cx="${xAt(index)}" cy="${y}" r="4" fill="${color}" stroke="#fff" stroke-width="1"><title>${item.date} ${item.action} @${item.price}</title></circle>`;
      }).join("") : "";
      const currentMarker = cycle?.topLevel === "高"
        ? `<text x="${right - 8}" y="${Math.max(top + 12, yAt(stock.price) - 9)}" text-anchor="end" fill="#28d76f" font-size="12" font-weight="700">逃顶预警</text>`
        : cycle?.bottomReady
          ? `<text x="${right - 8}" y="${Math.min(bottom - 5, yAt(stock.price) + 16)}" text-anchor="end" fill="#ff596a" font-size="12" font-weight="700">抄底观察</text>`
          : "";
      const labelFor = item => mode === "daily" ? item.date.slice(5) : String(item.time || "").slice(11, 16);
      const labelIndexes = [0, Math.floor((source.length - 1) / 2), source.length - 1];
      const axisLabels = labelIndexes.map((index, position) => `<text x="${xAt(index)}" y="284" text-anchor="${position === 0 ? "start" : position === 2 ? "end" : "middle"}" fill="#7990a5" font-size="10">${labelFor(source[index])}</text>`).join("");
      return `
        <section class="price-chart-panel">
          <div class="chart-head">
            <div class="section-title"><i data-lucide="candlestick-chart"></i>价格图与策略标记</div>
            <div class="chart-switch"><button class="${mode === "daily" ? "active" : ""}" data-chart-mode="daily">日线</button><button class="${mode === "intraday" ? "active" : ""}" data-chart-mode="intraday">分时</button></div>
          </div>
          <div class="price-chart-wrap"><svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="${stock.name}${mode === "daily" ? "日线" : "分时"}策略图">${grids}${levels}${plot}${marks}${currentMarker}${axisLabels}</svg></div>
          <div class="chart-legend"><span>红：上涨/买入信号</span><span>绿：下跌/卖出信号</span><span>黄：MA5/分时均价</span><span>紫：MA20</span><span>虚线：当天锁定计划</span></div>
        </section>
      `;
    }

    function analyzeTheorySet(stock) {
      const trend = stock.trendData;
      const bars = trend?.bars || [];
      if (bars.length < 60) return null;
      const recent = bars.slice(-60);
      const last = recent.at(-1);
      const previous20 = recent.slice(-21, -1);
      const previous10 = recent.slice(-11, -1);
      const donchianHigh = Math.max(...previous20.map(item => item.high));
      const donchianLow = Math.min(...previous20.map(item => item.low));
      const exitLow = Math.min(...previous10.map(item => item.low));
      const high60 = Math.max(...recent.map(item => item.high));
      const low60 = Math.min(...recent.map(item => item.low));
      const rangePosition = high60 > low60 ? ((stock.price - low60) / (high60 - low60)) * 100 : 50;
      const volume5 = average(recent.slice(-5).map(item => item.volume));
      const volume20 = average(recent.slice(-20).map(item => item.volume));
      const spring = last.low < donchianLow && stock.price > donchianLow;
      const upthrust = last.high > donchianHigh && stock.price < donchianHigh;

      const rawPivots = [];
      for (let index = 2; index < bars.length - 2; index++) {
        const item = bars[index];
        const left1 = bars[index - 1];
        const left2 = bars[index - 2];
        const right1 = bars[index + 1];
        const right2 = bars[index + 2];
        if (item.high > left1.high && item.high > left2.high && item.high >= right1.high && item.high >= right2.high) {
          rawPivots.push({ type: "top", index, price: item.high });
        } else if (item.low < left1.low && item.low < left2.low && item.low <= right1.low && item.low <= right2.low) {
          rawPivots.push({ type: "bottom", index, price: item.low });
        }
      }
      const pivots = [];
      rawPivots.forEach(pivot => {
        const previous = pivots.at(-1);
        if (!previous || previous.type !== pivot.type) {
          pivots.push(pivot);
        } else if ((pivot.type === "top" && pivot.price > previous.price) || (pivot.type === "bottom" && pivot.price < previous.price)) {
          pivots[pivots.length - 1] = pivot;
        }
      });
      const lastPivots = pivots.slice(-4);
      let centerLow = 0;
      let centerHigh = 0;
      if (lastPivots.length === 4) {
        const segments = lastPivots.slice(1).map((pivot, index) => {
          const previous = lastPivots[index];
          return { low: Math.min(previous.price, pivot.price), high: Math.max(previous.price, pivot.price) };
        });
        centerLow = Math.max(...segments.map(segment => segment.low));
        centerHigh = Math.min(...segments.map(segment => segment.high));
        if (centerLow > centerHigh) centerLow = centerHigh = 0;
      }
      const bottoms = pivots.filter(pivot => pivot.type === "bottom").slice(-2);
      let chanState = "结构未充分";
      let chanScore = 0;
      if (centerHigh) {
        if (stock.price > centerHigh && bottoms.length === 2 && bottoms[1].price > bottoms[0].price) {
          chanState = "中枢上方 · 类三买观察";
          chanScore = 1;
        } else if (stock.price > centerHigh) {
          chanState = "向上离开中枢";
          chanScore = 1;
        } else if (stock.price < centerLow) {
          chanState = "跌破中枢";
          chanScore = -1;
        } else {
          chanState = "中枢震荡";
        }
      } else if (pivots.at(-1)?.type === "bottom") {
        chanState = "底分型后上行观察";
        chanScore = 1;
      } else if (pivots.at(-1)?.type === "top") {
        chanState = "顶分型后回落观察";
        chanScore = -1;
      }

      let wyckoffState = "区间震荡";
      let wyckoffDetail = `60日位置${Math.round(rangePosition)}%，量能比${volume20 ? (volume5 / volume20).toFixed(2) : "--"}`;
      let wyckoffScore = 0;
      if (spring) {
        wyckoffState = "Spring回收观察";
        wyckoffDetail = `跌破前20日低点${donchianLow}后收回，等待量价确认`;
        wyckoffScore = 1;
      } else if (upthrust) {
        wyckoffState = "Upthrust派发风险";
        wyckoffDetail = `上破前20日高点${donchianHigh}后回落`;
        wyckoffScore = -1;
      } else if (trend.ma20 > trend.ma60 && rangePosition >= 55) {
        wyckoffState = "Markup拉升阶段";
        wyckoffScore = 1;
      } else if (trend.ma20 < trend.ma60 && rangePosition <= 45) {
        wyckoffState = "Markdown下跌阶段";
        wyckoffScore = -1;
      } else if (rangePosition <= 35) {
        wyckoffState = "Accumulation吸筹观察";
        wyckoffScore = volume5 <= volume20 * 1.2 ? 1 : 0;
      } else if (rangePosition >= 70 && volume5 > volume20 * 1.15) {
        wyckoffState = "Distribution派发观察";
        wyckoffScore = -1;
      }

      const trendScore = stock.price > trend.ma20 && trend.ma20 > trend.ma60 ? 1 : stock.price < trend.ma20 && trend.ma20 < trend.ma60 ? -1 : 0;
      const turtleScore = stock.price >= donchianHigh ? 1 : stock.price <= exitLow ? -1 : 0;
      const bollScore = stock.price <= trend.bollLower && trend.rsi14 < 35 ? 1 : stock.price >= trend.bollUpper && trend.rsi14 > 70 ? -1 : 0;
      const items = [
        { name: "缠论结构（简化）", state: chanState, detail: centerHigh ? `中枢约 ${centerLow.toFixed(priceDigits(stock.price))}-${centerHigh.toFixed(priceDigits(stock.price))}` : `最近识别${pivots.length}个有效分型`, score: chanScore },
        { name: "威科夫量价", state: wyckoffState, detail: wyckoffDetail, score: wyckoffScore },
        { name: "趋势跟随", state: trendScore > 0 ? "多头趋势" : trendScore < 0 ? "空头趋势" : "趋势不明确", detail: `MA20 ${trend.ma20} / MA60 ${trend.ma60}，ATR14 ${trend.atr14}%`, score: trendScore },
        { name: "海龟突破", state: turtleScore > 0 ? "20日突破" : turtleScore < 0 ? "10日退出触发" : "通道内等待", detail: `突破 ${donchianHigh.toFixed(priceDigits(stock.price))} / 退出 ${exitLow.toFixed(priceDigits(stock.price))}`, score: turtleScore },
        { name: "布林带 + RSI", state: bollScore > 0 ? "超卖回归观察" : bollScore < 0 ? "超买回落风险" : trend.bollWidth < 10 ? "波动收缩" : "中性区间", detail: `下${trend.bollLower} / 中${trend.ma20} / 上${trend.bollUpper}，RSI ${trend.rsi14}`, score: bollScore }
      ];
      const totalScore = items.reduce((sum, item) => sum + item.score, 0);
      return {
        items,
        totalScore,
        consensus: totalScore >= 2 ? "多理论偏多共振" : totalScore <= -2 ? "多理论偏空共振" : "理论信号分化",
        cls: totalScore >= 2 ? "safe" : totalScore <= -2 ? "danger" : "warn"
      };
    }

    async function fetchDailyTrend(stock) {
      const fields1 = "f1,f2,f3,f4,f5,f6";
      const fields2 = "f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61";
      const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${marketPrefix(stock.code)}.${stock.code}&klt=101&fqt=1&lmt=120&end=20500101&fields1=${fields1}&fields2=${fields2}`;
      const response = await eastmoneyJsonp(url, 8000);
      const rows = response?.data?.klines || [];
      if (rows.length < 60) throw new Error("日线数据不足");
      const parsed = rows.map(row => {
        const parts = row.split(",");
        return {
          date: parts[0],
          open: asNumber(parts[1]),
          close: asNumber(parts[2]),
          high: asNumber(parts[3]),
          low: asNumber(parts[4]),
          volume: asNumber(parts[5])
        };
      });
      const closes = parsed.map(item => item.close);
      const last20 = parsed.slice(-20);
      const high20 = Math.max(...last20.map(item => item.high));
      const low20 = Math.min(...last20.map(item => item.low));
      const digits = priceDigits(stock.price);
      const position20 = high20 > low20 ? ((stock.price - low20) / (high20 - low20)) * 100 : 50;
      const ma5 = +average(closes.slice(-5)).toFixed(digits);
      const ma10 = +average(closes.slice(-10)).toFixed(digits);
      const ma20 = +average(closes.slice(-20)).toFixed(digits);
      const ma60 = +average(closes.slice(-60)).toFixed(digits);
      const trueRanges = parsed.slice(-14).map((item, index, items) => {
        const sourceIndex = parsed.length - 14 + index;
        const previousClose = sourceIndex > 0 ? parsed[sourceIndex - 1].close : item.close;
        return Math.max(item.high - item.low, Math.abs(item.high - previousClose), Math.abs(item.low - previousClose));
      });
      const atrValue = average(trueRanges);
      const bollStd = standardDeviation(closes.slice(-20));
      const bollUpper = +(ma20 + bollStd * 2).toFixed(digits);
      const bollLower = +(ma20 - bollStd * 2).toFixed(digits);
      const bollWidth = ma20 ? ((bollUpper - bollLower) / ma20) * 100 : 0;
      return {
        fetchedAt: Date.now(),
        ma5,
        ma10,
        ma20,
        ma60,
        rsi14: +rsi14(closes).toFixed(1),
        atr14: stock.price ? +((atrValue / stock.price) * 100).toFixed(1) : 0,
        bollUpper,
        bollLower,
        bollWidth: +bollWidth.toFixed(1),
        high20: +high20.toFixed(digits),
        low20: +low20.toFixed(digits),
        position20: Math.max(0, Math.min(100, Math.round(position20))),
        bars: parsed,
        trendLabel: stock.price >= ma5 && ma5 >= ma10 && ma10 >= ma20
          ? "多头排列"
          : stock.price <= ma5 && ma5 <= ma10 && ma10 <= ma20
            ? "空头排列"
            : "均线纠缠"
      };
    }

    async function getTrendData(stock) {
      const cached = state.trendCache[stock.code];
      if (cached && Date.now() - cached.fetchedAt < 5 * 60 * 1000) return cached;
      const data = await fetchDailyTrend(stock);
      state.trendCache[stock.code] = data;
      return data;
    }

    async function fetchIntradayData(stock) {
      const fields1 = "f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11,f12,f13";

      const url = `https://push2his.eastmoney.com/api/qt/stock/trends2/get?secid=${marketPrefix(stock.code)}.${stock.code}&fields1=${fields1}&fields2=${fields2}&ndays=1&iscr=0`;
      const response = await eastmoneyJsonp(url, 8000);
      const rows = response?.data?.trends || [];

      return {

          };

    async function getIntradayData(stock) {

    async function attachMarketContext(code) {
      const stock = state.stocks.find(item => item.code === code);
      if (!stock) return;
      const [trendResult, intradayResult, marketResult, announcementResult, forecastResult, researchResult] = await Promise.allSettled([
        getTrendData(stock),
        getIntradayData(stock),
        getMarketContext(),
        getStockAnnouncements(stock),
        getProfitForecast(stock),
        getResearchReports(stock)
      ]);
      if (trendResult.status === "fulfilled") stock.trendData = trendResult.value;
      else console.warn("日线指标加载失败", trendResult.reason);
      if (intradayResult.status === "fulfilled") stock.intradayData = intradayResult.value;
      else console.warn("分钟行情加载失败", intradayResult.reason);
      if (marketResult.status === "rejected") console.warn("市场板块加载失败", marketResult.reason);
      if (announcementResult.status === "fulfilled") stock.announcements = announcementResult.value;
      else console.warn("公告加载失败", announcementResult.reason);
      if (forecastResult.status === "fulfilled") stock.forecastData = forecastResult.value;
      else console.warn("机构盈利预测加载失败", forecastResult.reason);
      if (researchResult.status === "fulfilled") stock.researchReports = researchResult.value;
      else console.warn("个股研报加载失败", researchResult.reason);
      trackStrategySignal(stock);
      evaluateSignalLedger(stock);
      if (state.selected === code) render();
    }

    function quoteToStock(row, index) {
      const code = row.f12;
      const price = asNumber(row.f2);
      const chg = asNumber(row.f3);
      const open = asNumber(row.f17, price);
      const prevClose = asNumber(row.f18, price);
      const high = asNumber(row.f15, price);
      const low = asNumber(row.f16, price);
      const amount = +(asNumber(row.f6) / 100000000).toFixed(2);
      const turnover = asNumber(row.f8);
      const amplitude = asNumber(row.f7);
      const volumeRatio = asNumber(row.f10);
      const change5m = asNumber(row.f11);
      const speed = asNumber(row.f22);
      const change60d = asNumber(row.f24);
      const changeYtd = asNumber(row.f25);
      const net = Math.round(asNumber(row.f62) / 10000);
      const mainNetRatio = asNumber(row.f184);
      const superOrder = Math.round(asNumber(row.f66) / 10000);
      const superNetRatio = asNumber(row.f69);
      const industry = row.f100 || "未知行业";
      const totalMarketCap = asNumber(row.f20);
      const floatMarketCap = asNumber(row.f21);
      const pe = asNumber(row.f9);
      const peTtm = asNumber(row.f115, pe);
      const pb = asNumber(row.f23);
      const openPct = prevClose ? ((open - prevClose) / prevClose) * 100 : 0;
      const intradayPos = high > low ? ((price - low) / (high - low)) * 100 : 50;
      const closePos = intradayPos;
      const openHold = open ? ((price - open) / open) * 100 : 0;
      const moneyPower = Math.max(-20, Math.min(20, net / 3000));
      const auctionBoost = state.mode === "auction" ? Math.max(-10, Math.min(16, openPct * 3)) : 0;
      const closeBoost = state.mode === "close" ? Math.max(-8, Math.min(12, intradayPos / 9 - 4)) : 0;
      const score = Math.max(12, Math.min(99, Math.round(52 + chg * 3.1 + moneyPower + turnover * .45 + auctionBoost + closeBoost)));
      const momentum = Math.max(5, Math.min(100, Math.round(48 + chg * 4 + intradayPos * .32 + turnover * .35)));
      const liquidity = Math.max(10, Math.min(100, Math.round(35 + Math.log10(Math.max(1, amount)) * 22 + turnover * .7)));
      const risk = Math.max(1, Math.min(100, Math.round(100 - score + Math.max(0, -chg) * 6 + (net < 0 ? 12 : 0))));
      const digits = priceDigits(price);
      const support1 = +(Math.max(low, price * 0.97)).toFixed(digits);
      const support2 = +(Math.max(0.01, Math.min(low, price * 0.94))).toFixed(digits);
      const pressure1 = +(Math.max(high, price * 1.025)).toFixed(digits);
      const pressure2 = +(Math.max(pressure1, price * 1.06)).toFixed(digits);
      const confidence = Math.max(22, Math.min(98, Math.round(score * .68 + liquidity * .18 + (net > 0 ? 10 : 0))));

      return {
        code,
        name: row.f14 || stockNames[code] || `自选股${code.slice(-3)}`,
        price,
        chg: +chg.toFixed(2),
        amount,
        support1,
        support2,
        pressure1,
        pressure2,
        stop: +(support2 * .985).toFixed(digits),
        score,
        momentum,
        liquidity,
        risk,
        confidence,
        net,
        superOrder,
        trend: score >= 78 ? "强势吸筹" : score >= 62 ? "回踩低吸" : score >= 48 ? "观望等信号" : "风险出货",
        board: code.startsWith("3") ? "创业板" : code.startsWith("688") ? "科创板" : "主板",
        concentration: score > 78 ? "高度集中" : score > 55 ? "中等集中" : "一般分散",
        open,
        openPct: +openPct.toFixed(2),
        openHold: +openHold.toFixed(2),
        high,
        low,
        closePos: Math.round(closePos),
        prevClose,
        turnover,
        amplitude,
        volumeRatio,
        change5m,
        speed,
        change60d,
        changeYtd,
        mainNetRatio,
        superNetRatio,
        industry,
        totalMarketCap,
        floatMarketCap,
        pe,
        peTtm,
        pb,
        source: "东方财富"
      };
    }

    function modeScore(stock) {
      const money = Math.max(-20, Math.min(20, stock.net / 3000));
      if (state.mode === "auction") {
        return Math.max(12, Math.min(99, Math.round(
          48 + (stock.openPct || 0) * 7 + (stock.openHold || 0) * 4 + money + (stock.turnover || 0) * .35
        )));
      }
      if (state.mode === "intraday") {
        return Math.max(12, Math.min(99, Math.round(
          45 + stock.chg * 3.2 + (stock.closePos || 50) * .24 + money + (stock.turnover || 0) * .45
        )));
      }
      return Math.max(12, Math.min(99, Math.round(
        42 + stock.chg * 2.2 + (stock.closePos || 50) * .42 + money * .8 + (stock.turnover || 0) * .25
      )));
    }

    function withModeScores(stocks) {
      return stocks.map(stock => {
        const score = modeScore(stock);
        const risk = Math.max(1, Math.min(100, Math.round(100 - score + Math.max(0, -stock.chg) * 5 + (stock.net < 0 ? 10 : 0))));
        const momentum = state.mode === "auction"
          ? Math.max(5, Math.min(100, Math.round(50 + (stock.openPct || 0) * 8 + (stock.openHold || 0) * 5 + (stock.net > 0 ? 12 : -8))))
          : Math.max(5, Math.min(100, Math.round(45 + stock.chg * 4 + (stock.closePos || 50) * .3 + (stock.turnover || 0) * .35)));
        const confidence = Math.max(22, Math.min(98, Math.round(score * .7 + stock.liquidity * .16 + (stock.net > 0 ? 9 : 0))));
        return {
          ...stock,
          score,
          risk,
          momentum,
          confidence,
          concentration: score > 78 ? "高度集中" : score > 55 ? "中等集中" : "一般分散",
          trend: score >= 78 ? "强势吸筹" : score >= 62 ? "回踩低吸" : score >= 48 ? "观望等信号" : "风险出货",
          ...fundamentalRisk(stock, score)
        };
      });
    }

    function fundamentalRisk(stock, score = stock.score) {
      const name = stock.name || "";
      const reasons = [];
      let levelScore = 0;

      if (/退市/.test(name)) {
        levelScore += 100;
        reasons.push("名称含退市标签");
      }
      if (/(^|[^A-Z])\*?ST/i.test(name)) {
        levelScore += 80;
        reasons.push("名称含ST或*ST标签");
      }
      if (!stock.price || stock.price <= 0 || !stock.amount) {
        levelScore += 55;
        reasons.push("价格或成交额异常，可能停牌/退市整理/无有效行情");
      }
      if (stock.totalMarketCap > 0 && stock.totalMarketCap < 3000000000) {
        levelScore += 18;
        reasons.push("总市值偏小，波动和壳风险更高");
      }
      if (stock.peTtm < 0 || stock.pe < 0) {
        levelScore += 24;
        reasons.push("市盈率为负，盈利质量需要核查");
      }
      if (stock.peTtm > 120 || stock.pe > 150) {
        levelScore += 14;
        reasons.push("估值偏高，需确认业绩兑现");
      }
      if (stock.pb > 12) {
        levelScore += 10;
        reasons.push("PB偏高，注意估值回落风险");
      }

      if (!reasons.length) reasons.push("未发现明显ST/退市名称风险");
      if (levelScore < 80) {
        reasons.push("质押、解禁、商誉、监管问询需结合公告继续核查");
      }
      const level = levelScore >= 80 ? "高" : levelScore >= 35 ? "中" : "低";
      const health = Math.max(5, Math.min(99, Math.round(86 - levelScore * .55 + Math.min(10, score / 10))));
      return {
        stRiskLevel: level,
        stRiskReasons: reasons,
        fundamentalHealth: health
      };
    }

    function fmtCap(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return "--";
      if (n >= 1000000000000) return `${(n / 1000000000000).toFixed(2)}万亿`;
      return `${(n / 100000000).toFixed(2)}亿`;
    }

    function fmtRatio(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n === 0) return "--";
      return n.toFixed(2);
    }

    function inferredProfitYi(stock) {
      if (stock.totalMarketCap > 0 && stock.peTtm > 0) {
        return stock.totalMarketCap / stock.peTtm / 100000000;
      }
      if (stock.totalMarketCap > 0 && stock.pe > 0) {
        return stock.totalMarketCap / stock.pe / 100000000;
      }
      return 0;
    }

    function defaultTargetPe(stock) {
      const base = stock.peTtm > 0 ? stock.peTtm : stock.pe;
      if (base > 0) return Math.max(12, Math.min(80, +(base * 0.85).toFixed(1)));
      if (/半导体|芯片|人工智能|算力|机器人/.test(stock.industry || "")) return 45;
      return 25;
    }

    function targetValuation(stock) {
      const forecast = stock.forecastData;
      const inferred = inferredProfitYi(stock);
      const totalShares = stock.price > 0 && stock.totalMarketCap > 0
        ? stock.totalMarketCap / stock.price
        : 0;
      const estimate = forecast?.estimates?.[0] || null;
      const hasTargetRange = forecast?.targetMin > 0 && forecast?.targetMax > 0;
      const forecastProfit = estimate && totalShares > 0
        ? estimate.eps * totalShares / 100000000
        : inferred * 1.15;
      const targetPrice = hasTargetRange
        ? (forecast.targetMin + forecast.targetMax) / 2
        : estimate?.eps > 0
          ? estimate.eps * defaultTargetPe(stock)
          : 0;
      const targetPe = estimate?.eps > 0 && targetPrice > 0 ? targetPrice / estimate.eps : defaultTargetPe(stock);
      const targetMarketCap = totalShares > 0 ? targetPrice * totalShares : forecastProfit * targetPe * 100000000;
      const upside = stock.price > 0 && targetPrice > 0 ? ((targetPrice / stock.price - 1) * 100) : 0;
      const conservative = hasTargetRange ? forecast.targetMin : targetPrice * 0.85;
      const optimistic = hasTargetRange ? forecast.targetMax : targetPrice * 1.18;
      return {
        forecast,
        estimate,
        totalShares,
        inferred,
        forecastProfit: +forecastProfit.toFixed(2),
        targetPe: +targetPe.toFixed(1),
        targetMarketCap,
        targetPrice,
        upside,
        conservative,
        optimistic,
        source: forecast
          ? hasTargetRange ? "东财机构一致预期 + 研报目标区间" : "东财机构一致预期EPS"
          : "无机构盈利预测，不生成目标价"
      };
    }

    function riskTagClass(level) {
      if (level === "高") return "danger";
      if (level === "中") return "warn";
      return "safe";
    }

    function mediumLongView(stock) {
      const stBad = stock.stRiskLevel === "高";
      const valuationHigh = stock.peTtm > 120 || stock.pb > 12;
      const valuationOk = stock.peTtm > 0 && stock.peTtm < 80 && stock.pb > 0 && stock.pb < 8;
      const mid = stBad
        ? "中期先排除：存在明显ST/退市或无有效行情风险，短线也只适合观望。"
        : stock.score >= 70 && stock.net >= 0
          ? "中期偏强：资金和价格结构还在，回踩不破关键支撑可继续跟踪。"
          : stock.net < 0
            ? "中期谨慎：主力净流出，先等资金重新转正。"
            : "中期中性：题材和流动性可看，但需要等趋势确认。";
      const long = stBad
        ? "长期不建议纳入池：先等风险标签解除、财报和公告确认。"
        : valuationHigh
          ? "长期谨慎：估值偏高，除非业绩高速兑现，否则性价比一般。"
          : valuationOk && stock.fundamentalHealth >= 70
            ? "长期可观察：估值和基本面风险暂可接受，适合放入观察池。"
            : "长期观察：需要补充财报增速、利润质量和行业景气度后再定。";
      return { mid, long };
    }

    async function fetchEastmoneyStocks(codes) {
      const secids = codes.map(code => `${marketPrefix(code)}.${code}`).join(",");
      const fields = [
        "f2", "f3", "f4", "f5", "f6", "f7", "f8", "f9", "f10", "f11", "f12", "f14",
        "f15", "f16", "f17", "f18", "f20", "f21", "f22", "f23", "f24", "f25", "f62", "f66", "f69", "f72", "f75",
        "f78", "f81", "f84", "f87", "f100", "f102", "f115", "f184"
      ].join(",");
      const url = `https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=${encodeURIComponent(secids)}&fields=${fields}`;
      const data = await eastmoneyJsonp(url);
      const rows = data?.data?.diff || [];
      if (!rows.length) throw new Error("东财没有返回行情数据");
      return rows.map(quoteToStock);
    }

    function modeAdjustedAdvice(stock) {
      const plan = updateExecutionPlanEvents(stock, getExecutionPlan(stock));
      return executionSignal(stock, plan);
    }

    async function generate() {
      if (state.refreshing) return;
      syncMarketPhase();
      const codes = [...new Set([...(state.codes.length ? state.codes : defaultCodes()), ...state.queryCodes])];
      state.refreshing = true;
      state.refreshIn = 20;
      state.dataSource = "正在拉取东方财富行情...";
      render();
      try {
        const eastmoneyStocks = await fetchEastmoneyStocks(codes);
        state.stocks = withModeScores(eastmoneyStocks).sort((a, b) => b.score - a.score);
        state.lastSuccessAt = Date.now();
        state.lastError = "";
        state.dataSource = `东方财富实时行情 · ${new Date(state.lastSuccessAt).toLocaleTimeString("zh-CN", { hour12: false })}`;
      } catch (error) {
        console.warn(error);
        state.lastError = error.message;
        state.stocks = state.stocks.length
          ? withModeScores(state.stocks).sort((a, b) => b.score - a.score)
          : withModeScores(codes.map(makeStock)).sort((a, b) => b.score - a.score);
        state.dataSource = state.lastSuccessAt
          ? `实时刷新失败，保留上次行情 · ${error.message}`
          : `东财暂未返回，当前仅作界面演示 · ${error.message}`;
      }
      if (!state.stocks.some(s => s.code === state.selected)) state.selected = state.stocks[0]?.code;
      const selectedStock = state.stocks.find(stock => stock.code === state.selected);
      if (selectedStock?.source === "东方财富") {
        const [trendResult, intradayResult, marketResult, announcementResult, forecastResult, researchResult] = await Promise.allSettled([
          getTrendData(selectedStock),
          getIntradayData(selectedStock),
          getMarketContext(),
          getStockAnnouncements(selectedStock),
          getProfitForecast(selectedStock),
          getResearchReports(selectedStock)
        ]);
        if (trendResult.status === "fulfilled") selectedStock.trendData = trendResult.value;
        else console.warn("日线指标加载失败", trendResult.reason);
        if (intradayResult.status === "fulfilled") selectedStock.intradayData = intradayResult.value;
        else console.warn("分钟行情加载失败", intradayResult.reason);
        if (marketResult.status === "rejected") console.warn("市场板块加载失败", marketResult.reason);
        if (announcementResult.status === "fulfilled") selectedStock.announcements = announcementResult.value;
        else console.warn("公告加载失败", announcementResult.reason);
        if (forecastResult.status === "fulfilled") selectedStock.forecastData = forecastResult.value;
        else console.warn("机构盈利预测加载失败", forecastResult.reason);
        if (researchResult.status === "fulfilled") selectedStock.researchReports = researchResult.value;
        else console.warn("个股研报加载失败", researchResult.reason);
        trackStrategySignal(selectedStock);
        evaluateSignalLedger(selectedStock);
      }
      state.refreshing = false;
      state.refreshIn = 20;
      render();
    }

    function removeCode(code) {
      state.codes = state.codes.filter(item => item !== code);
      state.queryCodes = state.queryCodes.filter(item => item !== code);
      if (!state.codes.length) state.codes = defaultCodes();
      if (state.selected === code) state.selected = state.codes[0];
      saveCodes();

    function fmtMoney(n) {
      const abs = Math.abs(n);
      if (abs >= 10000) return `${Math.round(n / 10000)}万`;
      return `${Math.round(n)}万`;
    }

    function updateRefreshControls() {
      const text = document.getElementById("refreshCountdown");
      const btn = document.getElementById("quickRefreshBtn");
      if (text) text.textContent = state.refreshing ? "刷新中" : `刷新 ${state.refreshIn}s`;
      if (btn) btn.classList.toggle("refreshing", state.refreshing);

      const phaseName = document.getElementById("livePhaseName");
      const phaseNote = document.getElementById("livePhaseNote");
      const freshness = document.getElementById("liveFreshness");
      const freshText = document.getElementById("liveFreshText");
      const liveBtn = document.getElementById("liveRefreshBtn");
      const liveText = document.getElementById("liveRefreshText");
      if (phaseName) phaseName.textContent = state.phaseName;
      if (phaseNote) phaseNote.textContent = `${state.phaseNote} · 20秒自动更新`;
      if (liveText) liveText.textContent = state.refreshing ? "刷新中" : "立即刷新";
      if (liveBtn) liveBtn.classList.toggle("refreshing", state.refreshing);
      if (!freshness || !freshText) return;

      freshness.className = "live-freshness";
      const age = state.lastSuccessAt ? Math.floor((Date.now() - state.lastSuccessAt) / 1000) : Infinity;
      if (state.refreshing) {
        freshness.classList.add("loading");
        freshText.textContent = "正在连接东方财富...";
      } else if (state.lastError) {
        freshness.classList.add("error");
        freshText.textContent = state.lastSuccessAt
          ? `刷新失败 · 保留 ${new Date(state.lastSuccessAt).toLocaleTimeString("zh-CN", { hour12: false })} 行情`
          : "实时行情连接失败 · 请手动刷新";
      } else if (!state.lastSuccessAt) {
        freshness.classList.add("stale");
        freshText.textContent = "等待首次实时行情";
      } else if (age > 45) {
        freshness.classList.add("stale");
        freshText.textContent = `行情已 ${age} 秒未更新 · 建议刷新`;
      } else {
        freshText.textContent = `实时 ${new Date(state.lastSuccessAt).toLocaleTimeString("zh-CN", { hour12: false })} · 下次 ${state.refreshIn}s`;
      }
    }

    function renderMetrics() {
      const copy = modeCopy[state.mode];
      const hasRealData = state.stocks.some(stock => stock.source === "东方财富");
      const heat = Math.round(state.stocks.reduce((sum, s) => sum + s.score, 0) / Math.max(1, state.stocks.length));
      const upPct = Math.round(state.stocks.filter(s => s.chg > 0).length / Math.max(1, state.stocks.length) * 100);
      const limitCount = state.stocks.filter(stock => {
        const threshold = /(^|[^A-Z])\*?ST/i.test(stock.name || "") ? 4.8 : /^(300|301|688)/.test(stock.code) ? 19.5 : 9.5;
        return stock.chg >= threshold;
      }).length;
      const amount = state.stocks.reduce((sum, s) => sum + s.amount, 0).toFixed(2);
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      const vals = hasRealData ? [`${heat}分`, `${upPct}%`, limitCount, `${amount}亿`, time] : ["--", "--", "--", "--", time];
      document.getElementById("metrics").innerHTML = copy.metrics.map((label, i) => `
        <div class="metric"><span>${label}</span><strong>${vals[i]}</strong></div>
      `).join("");
      document.getElementById("statusText").textContent = `${copy.status} · ${state.dataSource}`;

        `本计划在${new Date(plan.createdAt).toLocaleTimeString("zh-CN", { hour12: false })}按${plan.anchorPrice}元生成；${planLockStatus(plan)}。`,

    function sectorPulse(stock) {
      const peers = state.stocks.filter(item => item.industry && item.industry === stock.industry);
      const count = peers.length || 1;
      const avg = Math.round(peers.reduce((sum, item) => sum + item.score, 0) / count);
      const upCount = peers.filter(item => item.chg >= 0).length;
      const leader = [...peers].sort((a, b) => b.score - a.score)[0] || stock;
      const role = leader.code === stock.code ? "板块领涨/核心候选" : `跟随 ${leader.name}`;
      const strength = avg >= 75 ? "强主线" : avg >= 60 ? "可持续观察" : "弱轮动";
      return { count, avg, upCount, leader, role, strength };
    }

    function tradeTriggers(stock) {
      const plan = updateExecutionPlanEvents(stock, getExecutionPlan(stock));
      const signal = executionSignal(stock, plan);
      const position = stock.stRiskLevel === "高" ? "0成，先排除" : stock.score >= 80 ? "2-3成试仓" : stock.score >= 65 ? "1-2成低吸" : "0-1成观察";
      return {
        plan,
        buyZone: `${plan.buyLow}-${plan.buyHigh}`,
        breakout: plan.breakout,
        noChase: `${plan.noChaseAbove}以上不追`,
        stop: plan.stop,
        takeProfit: plan.target1,
        takeProfit2: plan.target2,
        position,
        condition: signal[1],
        signal,
        eventText: planEventText(plan)
      };
    }

    function holdingView(stock) {
      const planLevels = getExecutionPlan(stock);
      const holding = readHolding(stock.code);
      const cost = Number(holding.cost) || 0;
      const shares = Number(holding.shares) || 0;
      const availableShares = Math.min(shares, Math.max(0, Number(holding.availableShares ?? shares) || 0));
      const todayReduced = Math.max(0, Number(holding.todayReduced) || 0);
      const profit = cost > 0 && shares > 0 ? (stock.price - cost) * shares : 0;
      const profitPct = cost > 0 ? ((stock.price / cost - 1) * 100) : 0;
      const maxRisk = cost > 0 && shares > 0 ? Math.max(0, (cost - planLevels.stop) * shares) : 0;
      const plan = !cost || !shares
        ? "未填写持仓，按观察计划处理。"
        : stock.price >= planLevels.target2
          ? `已到二档止盈${planLevels.target2}，优先兑现。`
          : stock.price >= planLevels.target1
            ? `已到一档止盈${planLevels.target1}，先减仓。`
            : planLevels.events?.target1 && stock.price <= planLevels.protectStop
              ? `一档止盈后已回落到保护线${planLevels.protectStop}，处理剩余仓位。`
            : stock.price <= planLevels.stop
              ? `已破固定止损${planLevels.stop}，优先控制风险。`
              : `卖点固定在${planLevels.target1}/${planLevels.target2}，止损${planLevels.stop}。`;
      return { holding, cost, shares, availableShares, todayReduced, profit, profitPct, maxRisk, plan };
    }

    function pageAlerts(stock) {
      const plan = updateExecutionPlanEvents(stock, getExecutionPlan(stock));
      const signal = executionSignal(stock, plan);
      const spike = analyzeStraightLine(stock);
      const alerts = [];
      if (spike?.detected && spike.decayRisk >= 60) alerts.push(["danger", `${spike.conclusion}：回落风险${spike.decayRisk}分，封板条件${spike.sealScore}分。`]);
      else if (spike?.detected && spike.sealScore >= 70) alerts.push(["", `${spike.conclusion}：封板条件${spike.sealScore}分，仍需观察封单。`]);
      if (stock.stRiskLevel === "高") alerts.push(["danger", "基本面/ST风险高：优先排除，不参与短线博弈。"]);
      if (signal[0].includes("止损") || signal[0].includes("失效")) alerts.push(["danger", `${signal[0]}：${signal[1]}。`]);
      if (signal[0].includes("止盈") || signal[0].includes("减仓")) alerts.push(["warn", `${signal[0]}：${signal[1]}。`]);
      if (signal[0].includes("低吸") || signal[0].includes("突破触发")) alerts.push(["", `${signal[0]}：${signal[1]}。`]);
      if (signal[0].includes("错过")) alerts.push(["warn", `${signal[0]}：${signal[1]}，不移动价位追高。`]);
      if (stock.net < 0) alerts.push(["warn", `主力净额为 ${fmtMoney(stock.net)}，盘中不要盲目加仓。`]);
      if (!alerts.length) alerts.push(["", `${signal[0]}：${signal[1]}。固定计划不会随刷新变化。`]);
      return alerts;
    }

    function scoreReviewItem(item) {
      const stock = state.stocks.find(s => s.code === item.code);
      if (!stock) {
        return { label: "待更新", cls: "", detail: "当前监控池暂无该股票行情" };
      }
      const move = item.price > 0 ? ((stock.price / item.price - 1) * 100) : 0;
      const bullish = /低吸触发|突破触发|持有观察|候选/.test(item.action);
      const bearish = /止损|减仓|止盈|风险|失效|错过|排除/.test(item.action);
      if (bullish && stock.price >= item.pressure) {
        return { label: "命中压力", cls: "safe", detail: `现价${stock.price}，较记录${move.toFixed(1)}%` };
      }
      if (bullish && item.targetPrice && stock.price >= item.targetPrice) {
        return { label: "命中目标", cls: "safe", detail: `现价${stock.price}，已达目标价${item.targetPrice}` };
      }
      if (bullish && stock.price <= item.stop) {
        return { label: "触发止损", cls: "danger", detail: `现价${stock.price}，止损线${item.stop}` };
      }
      if (bearish && stock.price <= item.price) {
        return { label: "风险判断有效", cls: "safe", detail: `现价${stock.price}，较记录${move.toFixed(1)}%` };
      }
      if (bearish && stock.price > item.pressure) {
        return { label: "风险误判", cls: "danger", detail: `现价${stock.price}，已突破${item.pressure}` };
      }
      if (Math.abs(move) >= 3) {
        return { label: move > 0 ? "浮盈观察" : "走弱观察", cls: move > 0 ? "safe" : "warn", detail: `较记录${move.toFixed(1)}%` };
      }
      return { label: "未触发", cls: "", detail: `现价${stock.price}，较记录${move.toFixed(1)}%` };
    }

    function reviewStats(items) {
      const scored = items.map(item => scoreReviewItem(item));
      const done = scored.filter(s => /命中|有效|止损|误判/.test(s.label));
      const wins = done.filter(s => /命中|有效/.test(s.label)).length;
      return {
        total: items.length,
        done: done.length,
        wins,
        winRate: done.length ? Math.round(wins / done.length * 100) : 0
      };
    }

    function renderMain() {
      const stock = state.stocks.find(s => s.code === state.selected) || state.stocks[0];
      if (!stock) return;

      const action = executionSignal(stock, plan);
      const riskSignal = /止损|失效|风险/.test(action[0]);
      const sellSignal = /止盈|减仓/.test(action[0]);
      const waitSignal = /等待|错过|未确认|观察|企稳/.test(action[0]);
      const cardClass = riskSignal ? "risk" : waitSignal || sellSignal ? "warn" : "";
      const lines = explainLines(stock, action, plan);
      const modeValues = modeKeyValues(stock, plan);

      const barLabels = modeBarLabels();

      document.getElementById("mainAnalysis").innerHTML = `

            </div>

              <div class="quick-price ${stock.chg >= 0 ? "price-up" : "price-down"}">${stock.price}</div>
              <div class="quick-change ${stock.chg >= 0 ? "price-up" : "price-down"}">${stock.chg >= 0 ? "+" : ""}${stock.chg}%</div>
            </div>
          </div>
          <div class="quick-signal-row">
            <div class="quick-signal"><span class="badge ${signalClass}">${action[0]}</span> ${action[1]}</div>
            <div class="view-switch" aria-label="看盘视图">
              <button class="${state.simpleMode ? "active" : ""}" data-view-mode="simple">看盘</button>
              <button class="${state.simpleMode ? "" : "active"}" data-view-mode="detail">深度</button>
            </div>
          </div>
          <div class="quick-levels">
            <div class="quick-level"><span>固定低吸区</span><b class="price-up">${plan.buyLow}-${plan.buyHigh}</b></div>
            <div class="quick-level"><span>固定突破</span><b>${plan.breakout}</b></div>
            <div class="quick-level"><span>止盈一/二</span><b class="price-down">${plan.target1}/${plan.target2}</b></div>
            <div class="quick-level"><span>固定止损</span><b>${plan.stop}</b></div>
          </div>
          <div class="plan-lock-row">
            <span><i data-lucide="lock-keyhole"></i>${planLockStatus(plan)} · ${planEventText(plan)}</span>
            <button class="reset-plan-btn" data-reset-plan="${stock.code}" title="仅在除权、复牌或数据异常时重建"><i data-lucide="rotate-ccw"></i>特殊重建</button>
          </div>
          <div class="quick-note ${topAlert[0] || ""}">${topAlert[1]} 主力净额 ${fmtMoney(stock.net)}。</div>
        </section>
        ${renderDailyStrategyPanel(stock)}
        ${renderPriceChart(stock)}
        ${renderNewsRadarPanel(stock)}
        ${compactView ? "" : `
          ${renderCycleStrategyPanel(stock)}
          ${renderMarketRiskPanel(stock)}
          ${renderConfirmationPanel(stock)}
          ${renderStraightLinePanel(stock)}
          ${renderTheoryPanel(stock)}
        `}
        ${compactView ? `
          <section class="compact-plan">
            <div class="mini-card"><b>${triggers.signal[0]}</b>${triggers.signal[1]}<br><span class="code">${triggers.signal[2]}</span></div>
            <div class="mini-card"><b>固定卖点</b>${triggers.takeProfit} 先减 / ${triggers.takeProfit2} 止盈<br><span class="code">不随实时价格上移</span></div>
            <div class="mini-card"><b>仓位与风控</b>${triggers.position} · 跌破 ${triggers.stop} 当日计划失效</div>
          </section>
          ${renderMobilePositionPanel(stock)}
          ${renderMobileDeepAnalysis(stock)}
        ` : `
        <article class="agent-card">
          <div class="stock-head">
            <div>
              <h3>${stock.name}</h3>
              <div class="code">${stock.code} · ${stock.board}${stock.industry ? ` · ${stock.industry}` : ""} · ${stock.source || "模拟"}</div>
            </div>
            <div>
              <div class="big-price ${stock.chg >= 0 ? "price-up" : "price-down"}">${stock.price}</div>
              <div class="change ${stock.chg >= 0 ? "price-up" : "price-down"}">${stock.chg >= 0 ? "+" : ""}${stock.chg}%</div>
            </div>
          </div>
          <div class="badges">
            <span class="badge ${signalClass}">${action[0]}</span>
            <span class="badge info">置信度 ${stock.confidence}%</span>
            <span class="badge">${action[1]}</span>
            <span class="badge info">${state.phaseName}</span>
          </div>
          <div class="grid2">
            <div class="kv">
              ${modeValues.left.map(([label, value, cls]) => `<div><span>${label}</span><b class="${cls || ""}">${value}</b></div>`).join("")}
            </div>
            <div class="kv">
              ${modeValues.right.map(([label, value, cls]) => `<div><span>${label}</span><b class="${cls || ""}">${value}</b></div>`).join("")}
            </div>
          </div>
          <div class="score-grid">
            <div class="score-box"><span>${scoreLabels[0]}</span><strong>${stock.score}</strong></div>
            <div class="score-box"><span>${scoreLabels[1]}</span><strong>${stock.momentum}</strong></div>
            <div class="score-box"><span>${scoreLabels[2]}</span><strong>${state.mode === "close" ? stock.risk : Math.max(10, 100 - stock.risk)}</strong></div>
          </div>
          <div class="bars">
            <div class="bar-row"><span>${barLabels[0]}</span><div class="track"><div class="fill red" style="width:${stock.score}%"></div></div><b>${stock.score}</b></div>
            <div class="bar-row"><span>${barLabels[1]}</span><div class="track"><div class="fill green" style="width:${stock.risk}%"></div></div><b>${stock.risk}</b></div>
            <div class="bar-row"><span>${barLabels[2]}</span><div class="track"><div class="fill" style="width:${stock.liquidity}%"></div></div><b>${stock.liquidity}</b></div>
          </div>
          <div class="explain">
            <div class="section-title"><i data-lucide="message-square"></i>大白话解释</div>
            <ol>${lines.map(line => `<li>${line}</li>`).join("")}</ol>
          </div>
          ${renderDecisionTools(stock)}
          ${state.simpleMode ? "" : renderFundamentalPanel(stock)}
          <div class="strategy ${cardClass}">
            <div class="section-title"><i data-lucide="badge-check"></i>今日固定计划 · ${action[0]} · ${action[2]}</div>
            <div class="kv">
              <div><span>低吸区</span><b class="price-up">${plan.buyLow}-${plan.buyHigh}</b></div>
              <div><span>突破价 / 追价上限</span><b>${plan.breakout} / ${plan.noChaseAbove}</b></div>
              <div><span>止盈一 / 止盈二</span><b class="price-down">${plan.target1} / ${plan.target2}</b></div>
              <div><span>固定止损</span><b class="price-up">${plan.stop}</b></div>
            </div>
            <div class="action-grid">
              ${cards.map(([title, body]) => `<div class="action"><b>${title}</b><small>${body}</small></div>`).join("")}
            </div>
          </div>
        </article>
        `}
      `;
      lucide.createIcons();
    }

    function renderCandidates() {
      const list = [...state.stocks].sort((a, b) => b.score - a.score);
      document.getElementById("candidateCount").textContent = `${list.length}只`;
      document.getElementById("candidates").innerHTML = list.map(stock => {
        const plan = updateExecutionPlanEvents(stock, getExecutionPlan(stock));
        const action = executionSignal(stock, plan);
        const stText = stock.stRiskLevel === "高"
          ? " 基本面风险高，优先排除。"
          : stock.stRiskLevel === "中"
            ? " 基本面有瑕疵，降低仓位。"
            : " ST风险低。";
        const reason = `${action[0]}：${action[1]}。固定低吸${plan.buyLow}-${plan.buyHigh}，突破${plan.breakout}，止盈${plan.target1}/${plan.target2}，止损${plan.stop}。`;
        return `
          <div class="candidate">
            <div class="candidate-top">
              <span>${stock.name} ${stock.code}</span>
              <span class="score-pill">${stock.score}</span>
            </div>
            <p>${reason} 风险${stock.risk}分。${stText}</p>
          </div>
        `;
      }).join("");
    }

    function bindToolInputs() {
      const saveXMessageBtn = document.getElementById("saveXMessageBtn");
      if (saveXMessageBtn) {
        saveXMessageBtn.addEventListener("click", () => {
          const input = document.getElementById("xMessageInput");
          const raw = input?.value.trim() || "";
          const url = raw.match(/https?:\/\/(?:www\.)?(?:x\.com|twitter\.com)\/[A-Za-z0-9_]+\/status\/\d+/i)?.[0] || "";
          if (!url) {
            state.dataSource = "导入失败：请粘贴完整的X帖子链接，并尽量附上原文或摘要";
            render();
            return;
          }
          const stock = state.stocks.find(item => item.code === state.selected);
          if (!stock) return;
          const title = raw.replace(url, "").trim() || "X消息链接（未填写原文摘要）";
          const tone = classifyNewsText(title);
          const handle = url.match(/(?:x\.com|twitter\.com)\/([A-Za-z0-9_]+)/i)?.[1] || "X";
          const items = readManualNews();
          items.unshift({
            id: `x-${Date.now()}`,
            manual: true,
            code: stock.code,
            date: tradingDayKey(),
            source: `X @${handle}`,
            title,
            url,
            ...tone
          });
          saveManualNews(items);
          state.dataSource = `已导入${stock.name}的X消息，默认标记为待核实`;
          render();
        });
      }
      const addXAccountBtn = document.getElementById("addXAccountBtn");
      if (addXAccountBtn) {
        addXAccountBtn.addEventListener("click", () => {
          const input = document.getElementById("xAccountInput");
          const raw = input?.value.trim() || "";
          const handle = raw.replace(/^https?:\/\/(?:www\.)?x\.com\//i, "").replace(/^@/, "").split(/[/?#]/)[0].replace(/[^A-Za-z0-9_]/g, "");
          if (!handle) return;
          saveXAccounts([...readXAccounts(), handle]);
          render();
        });
      }
      document.querySelectorAll("[data-remove-x-account]").forEach(button => {
        button.addEventListener("click", () => {
          saveXAccounts(readXAccounts().filter(handle => handle !== button.dataset.removeXAccount));
          render();
        });
      });
      document.querySelectorAll("[data-remove-news]").forEach(button => {
        button.addEventListener("click", () => {
          saveManualNews(readManualNews().filter(item => item.id !== button.dataset.removeNews));
          render();
        });
      });
      document.querySelectorAll("[data-mobile-stock]").forEach(button => {
        button.addEventListener("click", () => {
          state.selected = button.dataset.mobileStock;
          render();
          attachMarketContext(state.selected);
        });
      });
      document.querySelectorAll("[data-mobile-pool-toggle]").forEach(button => {
        button.addEventListener("click", () => {
          state.mobilePoolOpen = !state.mobilePoolOpen;
          render();
        });
      });
      document.querySelectorAll("[data-mobile-remove]").forEach(button => {
        button.addEventListener("click", () => removeCode(button.dataset.mobileRemove));
      });
      document.querySelectorAll("[data-reset-plan]").forEach(button => {
        button.addEventListener("click", () => resetExecutionPlan(button.dataset.resetPlan));
      });
      document.querySelectorAll("[data-view-mode]").forEach(button => {
        button.addEventListener("click", () => {
          state.simpleMode = button.dataset.viewMode === "simple";
          saveSimpleMode();
          render();
        });
      });
      document.querySelectorAll("[data-chart-mode]").forEach(button => {
        button.addEventListener("click", () => {
          state.chartMode = button.dataset.chartMode;
          render();
        });
      });
      document.querySelectorAll(".holding-cost-input, .holding-shares-input, .holding-available-input, .holding-reduced-input").forEach(input => {
        input.addEventListener("change", () => {
          const code = input.dataset.code;
          const costInput = document.querySelector(`.holding-cost-input[data-code="${code}"]`);
          const sharesInput = document.querySelector(`.holding-shares-input[data-code="${code}"]`);
          const availableInput = document.querySelector(`.holding-available-input[data-code="${code}"]`);
          const reducedInput = document.querySelector(`.holding-reduced-input[data-code="${code}"]`);
          const shares = sharesInput?.value.trim() ? Number(sharesInput.value) : "";
          const availableShares = availableInput?.value.trim() ? Math.max(0, Number(availableInput.value)) : shares;
          saveHolding(code, {
            cost: costInput?.value.trim() ? Number(costInput.value) : "",
            shares,
            availableShares: shares === "" ? "" : Math.min(Number(shares), availableShares),
            todayReduced: reducedInput?.value.trim() ? Math.max(0, Number(reducedInput.value)) : 0
          });
          render();
        });
      });
      const toggle = document.getElementById("simpleModeToggle");
      if (toggle) {
        toggle.addEventListener("change", () => {
          state.simpleMode = toggle.checked;
          saveSimpleMode();
          render();
        });
      }
      const recordBtn = document.getElementById("recordReviewBtn");
      if (recordBtn) {
        recordBtn.addEventListener("click", () => {
          const stock = state.stocks.find(s => s.code === state.selected) || state.stocks[0];
          if (!stock) return;
          appendReview(stock, modeAdjustedAdvice(stock));
          render();
        });
      }
    }

    function render() {
      renderMetrics();
      renderWatchlist();
      renderMain();
      renderCandidates();
      bindToolInputs();
      updateRefreshControls();
      lucide.createIcons();
    }

    document.getElementById("refreshBtn").addEventListener("click", addCodesFromInput);
    document.getElementById("queryBtn").addEventListener("click", queryCodesFromInput);
    document.getElementById("codesInput").addEventListener("keydown", event => {
      if (event.key === "Enter") addCodesFromInput();
    });
    document.getElementById("pullBtn").addEventListener("click", () => {
      generate();
    });
    document.getElementById("liveRefreshBtn").addEventListener("click", generate);
    document.getElementById("quickRefreshBtn").addEventListener("click", generate);
    document.getElementById("prevStockBtn").addEventListener("click", () => selectRelativeStock(-1));
    document.getElementById("nextStockBtn").addEventListener("click", () => selectRelativeStock(1));
    setInterval(() => {
      const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement?.tagName);
      const phaseChanged = syncMarketPhase();
      if (document.body.classList.contains("locked") || document.hidden || state.refreshing || editing) {
        updateRefreshControls();
        return;
      }
      if (phaseChanged) {
        generate();
        return;
      }
      state.refreshIn -= 1;
      if (state.refreshIn <= 0) generate();
      else updateRefreshControls();
    }, 1000);
    document.addEventListener("visibilitychange", () => {
      const age = state.lastSuccessAt ? Date.now() - state.lastSuccessAt : Infinity;
      if (!document.hidden && !document.body.classList.contains("locked") && age > 25000) generate();
    });
    window.addEventListener("online", () => {
      if (!document.body.classList.contains("locked")) generate();
    });
    state.codes = loadSavedCodes();
    loadSimpleMode();
    syncMarketPhase();
    syncCodeInput("");
    setupAccessGate();
    if (!document.body.classList.contains("locked")) generate();
  </script>
